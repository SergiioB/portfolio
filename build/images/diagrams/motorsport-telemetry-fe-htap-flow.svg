<svg viewBox="0 0 1200 660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081019"/>
      <stop offset="100%" stop-color="#111c2b"/>
    </linearGradient>
    <linearGradient id="gcp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="50%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>
    <filter id="pulse" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7ad7ff"/>
    </marker>
  </defs>
  <rect width="1200" height="660" rx="24" fill="url(#bg2)"/>
  <text x="600" y="44" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Formula E Google Cloud Telemetry Flow</text>
  <text x="600" y="72" fill="#adc4df" font-family="Arial" font-size="14" text-anchor="middle">Edge buffering, event streaming, HTAP queries, and coaching output optimized for unstable urban connectivity.</text>

  <g transform="translate(36,126)">
    <rect width="236" height="196" rx="18" fill="#172231" stroke="#49d6ff" stroke-width="2"/>
    <text x="118" y="34" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">GEN3 Evo Edge</text>
    <text x="118" y="58" fill="#cad9ef" font-family="Arial" font-size="12" text-anchor="middle">Battery, inverter, AWD, regen, GPS</text>
    <rect x="26" y="84" width="184" height="28" rx="8" fill="#0e1623" stroke="#49d6ff"/>
    <text x="118" y="103" fill="#8be8ff" font-family="Courier New" font-size="11" text-anchor="middle">Local ring buffer for RF dropout</text>
    <rect x="26" y="126" width="184" height="18" rx="9" fill="#0e1623"/>
    <rect x="26" y="126" width="42" height="18" rx="9" fill="#49d6ff">
      <animate attributeName="width" values="34;176;128;90;42" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="118" y="172" fill="#ffd780" font-family="Arial" font-size="12" text-anchor="middle">Burst replay after signal recovery</text>
  </g>

  <g transform="translate(312,126)">
    <rect width="214" height="196" rx="18" fill="#172231" stroke="#49d6ff" stroke-width="2"/>
    <text x="107" y="34" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">City Gateway</text>
    <text x="107" y="58" fill="#cad9ef" font-family="Arial" font-size="12" text-anchor="middle">Trackside uplink and reassembly</text>
    <rect x="22" y="84" width="170" height="24" rx="8" fill="#0e1623" stroke="#72ffd8"/>
    <text x="107" y="100" fill="#72ffd8" font-family="Courier New" font-size="10" text-anchor="middle">authenticate + batch reconnect data</text>
    <rect x="22" y="118" width="170" height="24" rx="8" fill="#0e1623" stroke="#72ffd8"/>
    <text x="107" y="134" fill="#72ffd8" font-family="Courier New" font-size="10" text-anchor="middle">Cloud Run / secure event handoff</text>
    <rect x="22" y="156" width="170" height="16" rx="8" fill="#102536"/>
    <circle cx="40" cy="164" r="5" fill="#00f5a0">
      <animate attributeName="cx" values="40;176;40" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M 272 220 L 312 220" stroke="#7ad7ff" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <text x="292" y="204" fill="#7ad7ff" font-family="Arial" font-size="12" text-anchor="middle">replayed bursts</text>

  <g transform="translate(560,98)">
    <rect width="610" height="248" rx="22" fill="none" stroke="url(#gcp)" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="305" y="30" fill="#ffffff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Google Cloud Event and HTAP Plane</text>

    <g transform="translate(22,60)">
      <rect width="150" height="164" rx="16" fill="#162130" stroke="#4285F4" stroke-width="2"/>
      <text x="75" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Pub/Sub</text>
      <text x="75" y="50" fill="#bfd1ea" font-family="Arial" font-size="11" text-anchor="middle">Durable async event bus</text>
      <rect x="24" y="76" width="98" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <rect x="24" y="108" width="98" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <rect x="24" y="140" width="98" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <circle cx="34" cy="85" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="34;112;34" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="110" cy="117" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="110;34;110" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="52" cy="149" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="52;112;52" dur="1.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(192,60)">
      <rect width="164" height="164" rx="16" fill="#162130" stroke="#34A853" stroke-width="2"/>
      <text x="82" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Dataflow</text>
      <text x="82" y="50" fill="#bfd1ea" font-family="Arial" font-size="11" text-anchor="middle">Windowing and stream cleanup</text>
      <rect x="26" y="76" width="112" height="18" rx="9" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="82" y="89" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">window()</text>
      <rect x="26" y="108" width="112" height="18" rx="9" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="82" y="121" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">normalize()</text>
      <rect x="26" y="140" width="112" height="18" rx="9" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="82" y="153" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">drop-noise()</text>
    </g>

    <g transform="translate(378,60)">
      <rect width="176" height="74" rx="16" fill="#162130" stroke="#EA4335" stroke-width="2" filter="url(#pulse)"/>
      <text x="88" y="29" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">AlloyDB</text>
      <text x="88" y="51" fill="#ffd0cb" font-family="Arial" font-size="11" text-anchor="middle">Live state + columnar reads</text>
      <text x="88" y="64" fill="#bfd1ea" font-family="Courier New" font-size="10" text-anchor="middle">HTAP serving layer</text>
    </g>

    <g transform="translate(378,150)">
      <rect width="176" height="74" rx="16" fill="#162130" stroke="#F4B400" stroke-width="2"/>
      <text x="88" y="29" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">BigQuery</text>
      <text x="88" y="51" fill="#ffe59a" font-family="Arial" font-size="11" text-anchor="middle">Historical lap and season store</text>
      <text x="88" y="64" fill="#bfd1ea" font-family="Courier New" font-size="10" text-anchor="middle">perfect-lap reference sets</text>
    </g>

    <g transform="translate(576,60)">
      <rect width="164" height="164" rx="16" fill="#162130" stroke="#34A853" stroke-width="2" filter="url(#pulse)">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="82" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Vertex AI</text>
      <text x="82" y="50" fill="#6ef7a5" font-family="Arial" font-size="11" text-anchor="middle">Gemini coaching and reasoning</text>
      <rect x="26" y="76" width="112" height="22" rx="11" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="82" y="91" fill="#bbffd3" font-family="Courier New" font-size="10" text-anchor="middle">live telemetry</text>
      <rect x="26" y="108" width="112" height="22" rx="11" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="82" y="123" fill="#bbffd3" font-family="Courier New" font-size="10" text-anchor="middle">track geometry</text>
      <rect x="26" y="140" width="112" height="22" rx="11" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="82" y="155" fill="#bbffd3" font-family="Courier New" font-size="10" text-anchor="middle">historical vectors</text>
    </g>
  </g>

  <path d="M 526 220 L 560 220" stroke="#7ad7ff" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <text x="543" y="204" fill="#7ad7ff" font-family="Arial" font-size="12" text-anchor="middle">uplink</text>
  <path d="M 1136 220 C 1160 220 1160 220 1160 380" stroke="#34A853" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>

  <g transform="translate(840,392)">
    <rect width="300" height="128" rx="18" fill="#172231" stroke="#34A853" stroke-width="2"/>
    <text x="150" y="32" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Coaching Output</text>
    <text x="150" y="58" fill="#bbffd3" font-family="Arial" font-size="12" text-anchor="middle">Engineer prompts, lift-and-coast, regen advice</text>
    <rect x="30" y="76" width="240" height="30" rx="10" fill="#0f2b1b" stroke="#34A853"/>
    <text x="150" y="95" fill="#caffd7" font-family="Courier New" font-size="10" text-anchor="middle">"Lift 10m earlier at Turn 4; SoC recovery trending +2%"</text>
  </g>
</svg>
