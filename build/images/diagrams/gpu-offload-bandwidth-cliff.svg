<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="llama.cpp GPU offload bandwidth cliff diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gpuZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="cpuZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="24" fill="url(#bg)"/>

  <text x="72" y="72" fill="#f8fafc" font-size="34" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">
    llama.cpp GPU + CPU Offload: The Bandwidth Cliff
  </text>
  <text x="72" y="108" fill="#94a3b8" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif">
    More GPU-resident layers usually help until VRAM runs out and the hot path spills into slower system RAM.
  </text>

  <rect x="72" y="150" width="1056" height="420" rx="20" fill="#0f172a" stroke="#334155"/>
  <rect x="72" y="150" width="694" height="420" rx="20" fill="url(#gpuZone)"/>
  <rect x="766" y="150" width="362" height="420" rx="20" fill="url(#cpuZone)"/>

  <text x="320" y="188" fill="#a7f3d0" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700" text-anchor="middle">
    GPU VRAM zone
  </text>
  <text x="946" y="188" fill="#fca5a5" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700" text-anchor="middle">
    CPU / RAM spill zone
  </text>

  <line x1="766" y1="150" x2="766" y2="570" stroke="#f87171" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="766" y="140" fill="#fecaca" font-size="14" font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    VRAM cliff
  </text>

  <text x="88" y="548" fill="#94a3b8" font-size="14" font-family="Consolas, monospace">low -ngl</text>
  <text x="1028" y="548" fill="#94a3b8" font-size="14" font-family="Consolas, monospace">high -ngl</text>
  <text x="535" y="610" fill="#cbd5e1" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="600" text-anchor="middle">
    More layers offloaded to GPU
  </text>

  <text x="42" y="386" fill="#cbd5e1" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="600" transform="rotate(-90 42 386)">
    Interactive performance
  </text>

  <path d="M 112 500 C 250 430, 410 335, 610 248 S 770 216, 820 228 S 980 340, 1082 448"
        fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" filter="url(#softGlow)"/>
  <path d="M 112 500 C 250 430, 410 335, 610 248 S 770 216, 820 228 S 980 340, 1082 448"
        fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>

  <circle cx="650" cy="236" r="8" fill="#ecfeff">
    <animate attributeName="cx" values="150;650;970;150" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="472;236;350;472" dur="7s" repeatCount="indefinite"/>
  </circle>

  <rect x="128" y="278" width="196" height="78" rx="12" fill="#0f766e" fill-opacity="0.85" stroke="#2dd4bf"/>
  <text x="148" y="308" fill="#ccfbf1" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Lower -ngl</text>
  <text x="148" y="332" fill="#e6fffa" font-size="14" font-family="Consolas, monospace">More CPU layers</text>
  <text x="148" y="352" fill="#e6fffa" font-size="14" font-family="Consolas, monospace">Stable, but slower</text>

  <rect x="474" y="196" width="252" height="86" rx="12" fill="#14532d" fill-opacity="0.88" stroke="#22c55e"/>
  <text x="494" y="226" fill="#dcfce7" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Best stable zone</text>
  <text x="494" y="250" fill="#ecfccb" font-size="14" font-family="Consolas, monospace">Highest practical -ngl</text>
  <text x="494" y="270" fill="#ecfccb" font-size="14" font-family="Consolas, monospace">Before VRAM spills hard</text>

  <rect x="846" y="308" width="214" height="94" rx="12" fill="#7f1d1d" fill-opacity="0.88" stroke="#f87171"/>
  <text x="866" y="338" fill="#fee2e2" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Spill penalty</text>
  <text x="866" y="362" fill="#fecaca" font-size="14" font-family="Consolas, monospace">TTFT rises</text>
  <text x="866" y="382" fill="#fecaca" font-size="14" font-family="Consolas, monospace">Tokens/s drops</text>
  <text x="866" y="402" fill="#fecaca" font-size="14" font-family="Consolas, monospace">nvidia-smi looks full</text>

  <rect x="72" y="648" width="1056" height="72" rx="16" fill="#111827" stroke="#334155"/>
  <text x="100" y="681" fill="#f8fafc" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">
    Practical workflow
  </text>
  <text x="100" y="706" fill="#cbd5e1" font-size="16" font-family="Consolas, monospace">
    Increase -ngl gradually, watch nvidia-smi, leave VRAM headroom for KV cache, stop before the spill cliff.
  </text>
</svg>
