<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081019"/>
      <stop offset="100%" stop-color="#121c2b"/>
    </linearGradient>
    <linearGradient id="gcpC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="50%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>
    <marker id="arrowC" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#7ad7ff"/>
    </marker>
  </defs>
  <rect width="1200" height="560" rx="24" fill="url(#bgC)"/>
  <text x="600" y="44" fill="#fff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Formula E Google Cloud Ingest</text>
  <text x="600" y="72" fill="#adc4df" font-family="Arial" font-size="14" text-anchor="middle">Edge buffering and reconnect-safe event transport for city-circuit telemetry.</text>

  <g transform="translate(52,152)">
    <rect width="238" height="204" rx="20" fill="#172231" stroke="#49d6ff" stroke-width="2"/>
    <text x="119" y="38" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">GEN3 Evo Edge</text>
    <text x="119" y="66" fill="#cad9ef" font-family="Arial" font-size="13" text-anchor="middle">battery, inverter, AWD, regen, GPS</text>
    <rect x="28" y="102" width="182" height="28" rx="10" fill="#101a27" stroke="#49d6ff"/>
    <text x="119" y="121" fill="#8be8ff" font-family="Courier New" font-size="11" text-anchor="middle">Local ring buffer for RF dropout</text>
    <rect x="28" y="146" width="182" height="18" rx="9" fill="#101a27"/>
    <rect x="28" y="146" width="40" height="18" rx="9" fill="#49d6ff">
      <animate attributeName="width" values="28;176;122;84;40" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="119" y="190" fill="#ffd780" font-family="Arial" font-size="12" text-anchor="middle">burst replay after signal recovery</text>
  </g>

  <g transform="translate(356,152)">
    <rect width="238" height="204" rx="20" fill="#172231" stroke="#49d6ff" stroke-width="2"/>
    <text x="119" y="38" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">City Gateway</text>
    <text x="119" y="66" fill="#cad9ef" font-family="Arial" font-size="13" text-anchor="middle">reassemble, auth, and forward</text>
    <rect x="30" y="102" width="178" height="28" rx="10" fill="#101a27" stroke="#72ffd8"/>
    <text x="119" y="121" fill="#72ffd8" font-family="Courier New" font-size="10" text-anchor="middle">authenticate + batch reconnect data</text>
    <rect x="30" y="142" width="178" height="28" rx="10" fill="#101a27" stroke="#72ffd8"/>
    <text x="119" y="161" fill="#72ffd8" font-family="Courier New" font-size="10" text-anchor="middle">Cloud Run / secure handoff</text>
    <rect x="30" y="186" width="178" height="16" rx="8" fill="#102536"/>
    <circle cx="44" cy="194" r="5" fill="#00f5a0">
      <animate attributeName="cx" values="44;198;44" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M290 258 L356 258" stroke="#7ad7ff" stroke-width="4" marker-end="url(#arrowC)" fill="none"/>
  <text x="323" y="240" fill="#7ad7ff" font-family="Arial" font-size="12" text-anchor="middle">replayed bursts</text>

  <g transform="translate(660,110)">
    <rect width="492" height="286" rx="24" fill="none" stroke="url(#gcpC)" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="246" y="34" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Google Cloud Event Plane</text>

    <g transform="translate(24,72)">
      <rect width="188" height="170" rx="18" fill="#162130" stroke="#4285F4" stroke-width="2"/>
      <text x="94" y="34" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Pub/Sub</text>
      <text x="94" y="60" fill="#bfd1ea" font-family="Arial" font-size="12" text-anchor="middle">durable async event bus</text>
      <rect x="30" y="92" width="128" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <rect x="30" y="126" width="128" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <rect x="30" y="160" width="128" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <circle cx="40" cy="101" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="40;150;40" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="146" cy="135" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="146;42;146" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="56" cy="169" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="56;150;56" dur="1.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(246,72)">
      <rect width="214" height="170" rx="18" fill="#162130" stroke="#34A853" stroke-width="2"/>
      <text x="107" y="34" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Dataflow</text>
      <text x="107" y="60" fill="#bfd1ea" font-family="Arial" font-size="12" text-anchor="middle">windowing and stream cleanup</text>
      <rect x="34" y="94" width="146" height="20" rx="10" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="107" y="108" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">window()</text>
      <rect x="34" y="128" width="146" height="20" rx="10" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="107" y="142" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">normalize()</text>
      <rect x="34" y="162" width="146" height="20" rx="10" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="107" y="176" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">drop-noise()</text>
    </g>
  </g>

  <path d="M594 258 L660 258" stroke="#7ad7ff" stroke-width="4" marker-end="url(#arrowC)" fill="none"/>
  <text x="627" y="240" fill="#7ad7ff" font-family="Arial" font-size="12" text-anchor="middle">secure uplink</text>
</svg>
