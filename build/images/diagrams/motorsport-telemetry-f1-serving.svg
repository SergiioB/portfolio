    <text x="105" y="34" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">SageMaker</text>
    <text x="105" y="58" fill="#4fd1ff" font-family="Arial" font-size="12" text-anchor="middle">Tire, stint, and pace simulation</text>
