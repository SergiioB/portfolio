    <text x="95" y="58" fill="#72ffd8" font-family="Arial" font-size="12" text-anchor="middle">Fast metrics and anomaly rules</text>
    <rect x="26" y="76" width="138" height="8" rx="4" fill="#72ffd8" opacity="0.25"/>
    <rect x="26" y="76" width="54" height="8" rx="4" fill="#72ffd8">
