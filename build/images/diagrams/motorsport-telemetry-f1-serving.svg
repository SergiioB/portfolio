    <text x="95" y="62" fill="#cbdaf3" font-family="Arial" font-size="12" text-anchor="middle">stable input for consumers</text>
    <rect x="26" y="92" width="138" height="16" rx="8" fill="#11192a"/>
    <rect x="26" y="92" width="102" height="16" rx="8" fill="#ff8b1f">
