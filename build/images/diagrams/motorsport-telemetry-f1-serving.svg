    <text x="95" y="34" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">ECS Fargate</text>
    <text x="95" y="58" fill="#72ffd8" font-family="Arial" font-size="12" text-anchor="middle">Strategy and broadcast services</text>
    <rect x="26" y="76" width="138" height="8" rx="4" fill="#72ffd8" opacity="0.25"/>
    <rect x="56" y="76" width="50" height="8" rx="4" fill="#72ffd8">
      <animate attributeName="x" values="26;108;26" dur="1.8s" repeatCount="indefinite"/>
