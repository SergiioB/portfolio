    <text x="114" y="62" fill="#ffb9f5" font-family="Arial" font-size="12" text-anchor="middle">Telemetry, radio, and history synthesis</text>
    <rect x="38" y="92" width="152" height="22" rx="11" fill="#2c1433" stroke="#ff4fd8"/>
    <text x="114" y="107" fill="#ffd8fa" font-family="Courier New" font-size="10" text-anchor="middle">telemetry context</text>
    <rect x="38" y="124" width="152" height="22" rx="11" fill="#2c1433" stroke="#ff4fd8"/>
    <text x="114" y="139" fill="#ffd8fa" font-family="Courier New" font-size="10" text-anchor="middle">radio transcript</text>
    <rect x="38" y="156" width="152" height="22" rx="11" fill="#2c1433" stroke="#ff4fd8"/>
    <text x="114" y="171" fill="#ffd8fa" font-family="Courier New" font-size="10" text-anchor="middle">historical retrieval</text>
  </g>

  <path d="M254 248 L326 168" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrowB)" fill="none"/>
  <path d="M254 248 L326 300" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrowB)" fill="none"/>
  <path d="M516 168 L586 168" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrowB)" fill="none"/>
