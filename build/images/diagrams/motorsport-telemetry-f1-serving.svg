  </defs>
  <rect width="1200" height="560" rx="24" fill="url(#bgB)"/>
  <text x="600" y="44" fill="#fff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Formula 1 AWS Serving and Insight Layers</text>
  <text x="600" y="72" fill="#a7bddc" font-family="Arial" font-size="14" text-anchor="middle">Once the stream is safe, services branch into fast transforms, live state, simulation, and language generation.</text>

  <g transform="translate(64,164)">
    <rect width="190" height="170" rx="18" fill="#1c2439" stroke="#ffb347" stroke-width="2"/>
