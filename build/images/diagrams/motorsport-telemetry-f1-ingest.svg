<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#151c31"/>
    </linearGradient>
    <linearGradient id="amberA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff6b00"/>
    </linearGradient>
    <marker id="arrowA" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#8ec5ff"/>
    </marker>
  </defs>
  <rect width="1200" height="560" rx="24" fill="url(#bgA)"/>
  <text x="600" y="44" fill="#fff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Formula 1 AWS Telemetry Ingest</text>
  <text x="600" y="72" fill="#a7bddc" font-family="Arial" font-size="14" text-anchor="middle">Clean view of the hot path: car sensors, trackside aggregation, Kinesis shards, and SQS buffering.</text>

  <g transform="translate(48,150)">
    <rect width="230" height="212" rx="20" fill="#1c2439" stroke="#4fd1ff" stroke-width="2"/>
    <text x="115" y="38" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Car Sensor Bus</text>
    <text x="115" y="66" fill="#cbdaf3" font-family="Arial" font-size="13" text-anchor="middle">ECU, ERS, aero, brakes, GPS</text>
    <rect x="28" y="98" width="174" height="30" rx="10" fill="#11192a" stroke="#4fd1ff"/>
    <text x="115" y="118" fill="#92f0ff" font-family="Courier New" font-size="11" text-anchor="middle">300+ channels / 1.1M points/sec</text>
    <rect x="28" y="144" width="174" height="18" rx="9" fill="#11192a"/>
    <rect x="28" y="144" width="132" height="18" rx="9" fill="#00e0ff">
      <animate attributeName="width" values="42;164;88;148;132" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="28" y="182" width="174" height="24" rx="10" fill="#11192a" stroke="#ff7f7f"/>
    <text x="115" y="198" fill="#ffd4d4" font-family="Courier New" font-size="10" text-anchor="middle">MGU-K, brake-by-wire, X/Z mode</text>
  </g>

  <g transform="translate(346,150)">
    <rect width="236" height="212" rx="20" fill="#1c2439" stroke="#4fd1ff" stroke-width="2"/>
    <text x="118" y="38" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Trackside ETC</text>
    <text x="118" y="66" fill="#cbdaf3" font-family="Arial" font-size="13" text-anchor="middle">Decode, validate, align, forward</text>
    <rect x="28" y="98" width="180" height="28" rx="10" fill="#11192a" stroke="#72ffd8"/>
    <text x="118" y="117" fill="#72ffd8" font-family="Courier New" font-size="10" text-anchor="middle">CRC checks + packet ordering</text>
    <rect x="28" y="138" width="180" height="28" rx="10" fill="#11192a" stroke="#72ffd8"/>
    <text x="118" y="157" fill="#72ffd8" font-family="Courier New" font-size="10" text-anchor="middle">race clock alignment + replay</text>
    <rect x="28" y="182" width="180" height="16" rx="8" fill="#12243b"/>
    <circle cx="42" cy="190" r="5" fill="#00f5a0">
      <animate attributeName="cx" values="42;196;42" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M278 256 L346 256" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrowA)" fill="none"/>
  <text x="312" y="238" fill="#8ec5ff" font-family="Arial" font-size="12" text-anchor="middle">RF packets</text>

  <g transform="translate(646,110)">
    <rect width="508" height="294" rx="24" fill="none" stroke="url(#amberA)" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="254" y="34" fill="#ffbe73" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">AWS Ingest Plane</text>

    <g transform="translate(24,70)">
      <rect width="208" height="180" rx="18" fill="#1b2235" stroke="#ffb347" stroke-width="2"/>
      <text x="104" y="34" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Kinesis</text>
      <text x="104" y="60" fill="#c8d4ef" font-family="Arial" font-size="12" text-anchor="middle">Shard-based telemetry stream</text>
      <g transform="translate(28,88)">
        <rect width="150" height="16" rx="8" fill="#11192a"/>
        <rect width="110" height="16" rx="8" fill="#ff8b1f">
          <animate attributeName="width" values="28;146;78;126;110" dur="2.3s" repeatCount="indefinite"/>
        </rect>
      </g>
      <g transform="translate(28,120)">
        <rect width="150" height="16" rx="8" fill="#11192a"/>
        <rect width="70" height="16" rx="8" fill="#ff8b1f">
          <animate attributeName="width" values="36;130;62;144;70" dur="2.1s" repeatCount="indefinite"/>
        </rect>
      </g>
      <g transform="translate(28,152)">
        <rect width="150" height="16" rx="8" fill="#11192a"/>
        <rect width="126" height="16" rx="8" fill="#ff8b1f">
          <animate attributeName="width" values="52;150;98;134;126" dur="2.7s" repeatCount="indefinite"/>
        </rect>
      </g>
      <text x="104" y="176" fill="#91a9cf" font-family="Arial" font-size="11" text-anchor="middle">parallel shard fan-out under load</text>
    </g>

    <g transform="translate(268,70)">
      <rect width="214" height="180" rx="18" fill="#1b2235" stroke="#ffb347" stroke-width="2"/>
      <text x="107" y="34" fill="#fff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">SQS Buffer</text>
      <text x="107" y="60" fill="#c8d4ef" font-family="Arial" font-size="12" text-anchor="middle">Absorbs surge and protects consumers</text>
      <g transform="translate(42,90)">
        <rect width="130" height="20" rx="10" fill="#11192a" stroke="#65d6ff"/>
        <rect y="34" width="130" height="20" rx="10" fill="#11192a" stroke="#65d6ff"/>
        <rect y="68" width="130" height="20" rx="10" fill="#11192a" stroke="#65d6ff"/>
        <circle cx="12" cy="10" r="4" fill="#65d6ff">
          <animate attributeName="cx" values="12;118;12" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="112" cy="44" r="4" fill="#65d6ff">
          <animate attributeName="cx" values="112;16;112" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="30" cy="78" r="4" fill="#65d6ff">
          <animate attributeName="cx" values="30;118;30" dur="1.7s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>

  <path d="M582 256 L646 256" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrowA)" fill="none"/>
  <text x="614" y="238" fill="#8ec5ff" font-family="Arial" font-size="12" text-anchor="middle">fiber backhaul</text>
</svg>
