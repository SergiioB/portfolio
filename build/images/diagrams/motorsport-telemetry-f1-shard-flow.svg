  <path d="M 514 218 L 552 218" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <text x="533" y="202" fill="#8ec5ff" font-family="Arial" font-size="12" text-anchor="middle">fiber</text>

  <path d="M 1104 220 C 1136 220 1136 220 1136 370" stroke="#ff4fd8" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <g transform="translate(848,390)">
    <rect width="284" height="130" rx="18" fill="#1d2438" stroke="#ff4fd8" stroke-width="2"/>
    <text x="142" y="32" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Human Consumption</text>
    <text x="142" y="58" fill="#ffd4fa" font-family="Arial" font-size="12" text-anchor="middle">TV graphics, pit-wall prompts, strategy cues</text>
    <rect x="28" y="76" width="228" height="30" rx="10" fill="#2c1433" stroke="#ff4fd8"/>
    <text x="142" y="95" fill="#ffd4fa" font-family="Courier New" font-size="10" text-anchor="middle">"ERS deployment drop detected; pace delta rising"</text>
  </g>
</svg>
