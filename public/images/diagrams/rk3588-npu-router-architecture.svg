<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Specific Gradients -->
    <linearGradient id="npuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <linearGradient id="keepaliveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>

    <linearGradient id="prewarmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>
    
    <!-- Drop Shadow for Cards -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4" flood-color="#000000" />
    </filter>

    <!-- Flow Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bg)" />

  <!-- Global Title -->
  <text x="500" y="50" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">RK3588 NPU ROUTER ARCHITECTURE</text>
  <text x="500" y="75" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Tiered Inference with NPU Routing, Keepalive, and Background Pre-Warming</text>
  <line x1="100" y1="95" x2="900" y2="95" stroke="#334155" stroke-width="2" />

  <!-- ================= INFERENCE TIER ================= -->
  <g transform="translate(40, 120)" filter="url(#shadow)">
    <rect width="920" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" />
    <text x="460" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">INFERENCE TIER</text>

    <!-- TinyLlama -->
    <g transform="translate(40, 60)">
      <rect width="200" height="110" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2" />
      <path d="M 0 8 h 200 v 24 h -200 z" fill="url(#npuGrad)" />
      <text x="100" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">TinyLlama 1.1B ★</text>
      <text x="100" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">W8A8 NPU</text>
      <text x="100" y="75" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">15 tok/s</text>
      <rect x="50" y="85" width="100" height="16" rx="4" fill="#064e3b" />
      <text x="100" y="97" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">Priority: 110</text>
    </g>

    <!-- Qwen3-1.7B -->
    <g transform="translate(260, 60)">
      <rect width="180" height="110" rx="8" fill="#0f172a" stroke="#059669" stroke-width="1.5" />
      <path d="M 0 8 h 180 v 24 h -180 z" fill="#059669" />
      <text x="90" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Qwen3-1.7B</text>
      <text x="90" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">W8A8 NPU</text>
      <text x="90" y="75" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#34d399" text-anchor="middle">6.7 tok/s</text>
      <text x="90" y="97" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Priority: 100</text>
    </g>

    <!-- Qwen2.5-3B -->
    <g transform="translate(460, 60)">
      <rect width="180" height="110" rx="8" fill="#0f172a" stroke="#059669" stroke-width="1.5" />
      <path d="M 0 8 h 180 v 24 h -180 z" fill="#059669" />
      <text x="90" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Qwen2.5-3B</text>
      <text x="90" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">W8A8 NPU</text>
      <text x="90" y="75" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#34d399" text-anchor="middle">5.7 tok/s</text>
      <text x="90" y="97" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Priority: 80</text>
    </g>

    <!-- Qwen3.5-4B CPU -->
    <g transform="translate(660, 60)">
      <rect width="220" height="110" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
      <path d="M 0 8 h 220 v 24 h -220 z" fill="url(#cpuGrad)" />
      <text x="110" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Qwen3.5-4B (CPU)</text>
      <text x="110" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Q4_K_M</text>
      <text x="110" y="75" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#60a5fa" text-anchor="middle">2.4 tok/s</text>
      <text x="110" y="97" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Priority: 104 (Complex/Tools)</text>
    </g>
  </g>

  <!-- ================= MIDDLE ROW ================= -->
  <!-- NPU CMA Constraints -->
  <g transform="translate(40, 350)" filter="url(#shadow)">
    <rect width="440" height="230" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
    <path d="M 0 12 h 440 v 28 h -440 z" fill="url(#memoryGrad)" />
    <text x="220" y="32" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">NPU CMA MEMORY CONSTRAINTS</text>

    <rect x="30" y="60" width="380" height="40" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1" />
    <text x="220" y="85" font-family="monospace" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">CMA Pool: ~2.2GB Max Capacity</text>
    
    <g transform="translate(30, 120)">
      <circle cx="10" cy="5" r="4" fill="#34d399" />
      <text x="25" y="10" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">Model weights must fit ENTIRELY in CMA</text>
      
      <circle cx="10" cy="30" r="4" fill="#34d399" />
      <text x="25" y="35" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">No layer offloading like GPU VRAM</text>
      
      <circle cx="10" cy="55" r="4" fill="#34d399" />
      <text x="25" y="60" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">W8A8 quantization is REQUIRED</text>
      
      <path d="M 5 75 l 10 10 M 15 75 l -10 10" stroke="#ef4444" stroke-width="2" fill="none" />
      <text x="25" y="85" font-family="system-ui, sans-serif" font-size="13" fill="#fca5a5">No 4B+ models or MoE models on NPU</text>
    </g>
  </g>

  <!-- NPU Keepalive -->
  <g transform="translate(520, 350)" filter="url(#shadow)">
    <rect width="440" height="105" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" />
    <path d="M 0 12 h 440 v 24 h -440 z" fill="url(#keepaliveGrad)" />
    <text x="220" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">NPU KEEPALIVE MECHANISM</text>
    
    <text x="220" y="60" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">Prevents CMA memory eviction during idle periods</text>
    
    <rect x="60" y="70" width="150" height="24" rx="4" fill="#0f172a" stroke="#6d28d9" stroke-width="1" />
    <text x="135" y="87" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">Interval: 30s</text>
    
    <rect x="230" y="70" width="150" height="24" rx="4" fill="#0f172a" stroke="#6d28d9" stroke-width="1" />
    <text x="305" y="87" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">Timeout: 5s</text>
  </g>

  <!-- CPU Pre-Warm -->
  <g transform="translate(520, 475)" filter="url(#shadow)">
    <rect width="440" height="105" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2" />
    <path d="M 0 12 h 440 v 24 h -440 z" fill="url(#prewarmGrad)" />
    <text x="220" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">BACKGROUND CPU PRE-WARM</text>
    
    <text x="220" y="60" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">Hides 45s CPU cold-start latency behind NPU routing</text>
    
    <rect x="60" y="70" width="150" height="24" rx="4" fill="#0f172a" stroke="#be185d" stroke-width="1" />
    <text x="135" y="87" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f472b6" text-anchor="middle">Fire after routing</text>
    
    <rect x="230" y="70" width="150" height="24" rx="4" fill="#0f172a" stroke="#be185d" stroke-width="1" />
    <text x="305" y="87" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f472b6" text-anchor="middle">45s → Imperceptible</text>
  </g>

  <!-- ================= REQUEST FLOW ================= -->
  <g transform="translate(40, 610)" filter="url(#shadow)">
    <rect width="920" height="140" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <text x="460" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">AGENTIC REQUEST FLOW</text>

    <!-- Query -->
    <g transform="translate(40, 50)">
      <rect width="100" height="60" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="2" />
      <text x="50" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle">Query</text>
      <text x="50" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">User Input</text>
    </g>

    <line x1="140" y1="80" x2="180" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Router -->
    <g transform="translate(180, 50)">
      <rect width="140" height="60" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="2" />
      <path d="M 0 6 h 140 v 18 h -140 z" fill="url(#npuGrad)" />
      <text x="70" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">NPU Router</text>
      <text x="70" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#34d399" text-anchor="middle">&lt;50ms Response</text>
      <text x="70" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">TinyLlama/Qwen</text>
    </g>

    <line x1="320" y1="80" x2="360" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Intent -->
    <g transform="translate(360, 50)">
      <rect width="120" height="60" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
      <text x="60" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">Classify Intent</text>
      <text x="60" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#d97706" text-anchor="middle">CHAT / TOOL</text>
      <text x="60" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#d97706" text-anchor="middle">CODE / REASON</text>
    </g>

    <line x1="480" y1="80" x2="520" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Prewarm / CPU Load -->
    <g transform="translate(520, 50)">
      <rect width="130" height="60" rx="6" fill="#0f172a" stroke="#ec4899" stroke-width="2" />
      <path d="M 0 6 h 130 v 18 h -130 z" fill="url(#prewarmGrad)" />
      <text x="65" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Pre-Warm CPU</text>
      <text x="65" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#f472b6" text-anchor="middle">Background Load</text>
      <text x="65" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#f472b6" text-anchor="middle">If Tool/Reasoning</text>
    </g>

    <line x1="650" y1="80" x2="690" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Generate -->
    <g transform="translate(690, 50)">
      <rect width="100" height="60" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
      <text x="50" y="28" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#60a5fa" text-anchor="middle">Generate</text>
      <text x="50" y="46" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Process Tool</text>
      <text x="50" y="58" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Calls</text>
    </g>

    <line x1="790" y1="80" x2="830" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Response -->
    <g transform="translate(830, 50)">
      <rect width="70" height="60" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="2" />
      <text x="35" y="30" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399" text-anchor="middle">Output</text>
      <text x="35" y="48" font-family="system-ui, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Streamed</text>
    </g>
  </g>

  <!-- ================= BOTTOM ROW ================= -->
  <!-- Tool Calling -->
  <g transform="translate(40, 780)" filter="url(#shadow)">
    <rect width="440" height="130" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" />
    <path d="M 0 12 h 440 v 24 h -440 z" fill="url(#npuGrad)" />
    <text x="220" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">TOOL CALLING INTEGRATION</text>
    
    <g transform="translate(30, 60)">
      <circle cx="10" cy="5" r="4" fill="#34d399" />
      <text x="25" y="10" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">Hermes 2 Pro Native Formatter</text>
      
      <circle cx="10" cy="30" r="4" fill="#34d399" />
      <text x="25" y="35" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">Qwen XML Format &amp; JSON Legacy Fallback</text>
    </g>

    <rect x="230" y="60" width="180" height="45" rx="6" fill="#0f172a" stroke="#059669" stroke-width="1" />
    <text x="320" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle">parallel_tool_calls: false</text>
    <text x="320" y="96" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">(Disabled due to RK3588 memory)</text>
  </g>

  <!-- Flash Attention Fix -->
  <g transform="translate(520, 780)" filter="url(#shadow)">
    <rect width="440" height="130" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2" />
    <path d="M 0 12 h 440 v 24 h -440 z" fill="#be185d" />
    <text x="220" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">LLAMA.CPP FLASH ATTENTION FIX</text>
    
    <g transform="translate(30, 55)">
      <text x="0" y="10" font-family="monospace" font-size="12" fill="#fca5a5">Broken: --flash-attn --jinja</text>
      <text x="0" y="26" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">(--jinja consumed as value for flag)</text>

      <text x="0" y="50" font-family="monospace" font-size="12" font-weight="700" fill="#34d399">Fixed:  --flash-attn on --jinja</text>
      <text x="0" y="66" font-family="system-ui, sans-serif" font-size="11" fill="#cbd5e1">Requires engram restart to apply</text>
    </g>
  </g>

  <!-- Config Reference -->
  <g transform="translate(40, 940)">
    <rect width="920" height="40" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5" />
    <text x="460" y="25" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">NPU_TINY_ROUTER_MODEL | NPU_KEEPALIVE_ENABLED=true | ENGRAM_PREWARM_CPU_MODEL=true</text>
  </g>

</svg>