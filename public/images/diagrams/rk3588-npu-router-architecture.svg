<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.5" flood-color="#000000" />
    </filter>

    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#3fb950" flood-opacity="0.25" />
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#58a6ff" flood-opacity="0.25" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#bc8cff" flood-opacity="0.25" />
    </filter>

    <!-- Markers -->
    <marker id="arrowDefault" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bc8cff" />
    </marker>
  </defs>

  <rect width="1020" height="600" fill="url(#bg)" rx="16" />

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1" opacity="0.6"/>
  </pattern>
  <rect width="1020" height="600" fill="url(#grid)" rx="16" />

  <!-- Outer Boundary / Group Boxes -->
  <rect x="170" y="80" width="810" height="500" rx="12" fill="#0d1117" opacity="0.4" />
  <rect x="170" y="80" width="810" height="500" rx="12" fill="none" stroke="#30363d" stroke-width="2" stroke-dasharray="8 8" />
  <text x="190" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="1">RK3588 EDGE DEVICE</text>

  <!-- Title -->
  <text x="40" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#c9d1d9">RK3588 NPU Router Architecture</text>
  <text x="40" y="65" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Tiered Inference &amp; Resource Orchestration</text>

  <!-- Lines -->
  <!-- User -> NPU Router -->
  <path d="M 145 300 L 210 300" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowDefault)" />
  
  <!-- Keepalive -> NPU Router -->
  <path d="M 310 195 L 310 250" fill="none" stroke="#bc8cff" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowPurple)" />

  <!-- NPU Router -> Intent -->
  <path d="M 405 300 L 450 300" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text x="427" y="292" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3fb950" text-anchor="middle">&lt;50ms</text>

  <!-- Intent -> NPU Gen -->
  <path d="M 605 280 L 640 280 L 640 195 L 690 195" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowDefault)" />
  
  <!-- Intent -> CPU Gen -->
  <path d="M 605 320 L 640 320 L 640 425 L 690 425" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowDefault)" />

  <!-- Intent -> Pre-warm -->
  <path d="M 530 345 L 530 430" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowBlue)" />

  <!-- Pre-warm -> CPU Gen -->
  <path d="M 625 475 L 690 475" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowBlue)" />

  <!-- Path NPU Gen -> Output -->
  <path d="M 920 195 L 970 195" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text x="975" y="190" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="start">Stream</text>

  <!-- Path CPU Gen -> Output -->
  <path d="M 920 455 L 970 455" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)" />
  <text x="975" y="450" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="start">Stream</text>

  <!-- Labels over lines (so they occlude the line behind them) -->
  <rect x="610" y="225" width="60" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="640" y="240" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b949e" text-anchor="middle">Chat</text>

  <rect x="610" y="365" width="60" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="640" y="380" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b949e" text-anchor="middle">Tools</text>

  <rect x="635" y="465" width="50" height="20" rx="4" fill="#161b22" />
  <text x="660" y="479" font-family="system-ui, sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">Weights</text>

  <!-- Nodes -->
  <!-- User Input -->
  <g transform="translate(40, 270)">
    <rect width="100" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2" filter="url(#shadow)" />
    <text x="50" y="28" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">User Input</text>
    <text x="50" y="46" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Discord / API</text>
  </g>

  <!-- Keepalive -->
  <g transform="translate(220, 125)">
    <rect width="180" height="70" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="2" filter="url(#glowPurple)" />
    <path d="M 0 8 Q 0 0 8 0 L 172 0 Q 180 0 180 8 L 180 26 L 0 26 Z" fill="#bc8cff" opacity="0.2"/>
    <text x="90" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#bc8cff" text-anchor="middle" letter-spacing="0.5">KEEPALIVE CRON</text>
    <text x="90" y="44" font-family="system-ui, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="middle">30s Interval Pings</text>
    <text x="90" y="60" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Prevents CMA Eviction</text>
  </g>

  <!-- NPU Router -->
  <g transform="translate(220, 260)" filter="url(#glowGreen)">
    <rect width="180" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2" />
    <path d="M 0 8 Q 0 0 8 0 L 172 0 Q 180 0 180 8 L 180 26 L 0 26 Z" fill="#3fb950" opacity="0.2"/>
    <text x="90" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3fb950" text-anchor="middle" letter-spacing="1">NPU ROUTER</text>
    <text x="90" y="46" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#c9d1d9" text-anchor="middle">TinyLlama 1.1B</text>
    <text x="90" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">W8A8 • 15 tok/s</text>
  </g>

  <!-- Intent Router -->
  <g transform="translate(460, 260)">
    <rect width="140" height="80" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2" filter="url(#shadow)" />
    <path d="M 0 8 Q 0 0 8 0 L 132 0 Q 140 0 140 8 L 140 26 L 0 26 Z" fill="#d29922" opacity="0.2"/>
    <text x="70" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#d29922" text-anchor="middle" letter-spacing="0.5">INTENT ROUTER</text>
    <text x="70" y="46" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9" text-anchor="middle">Analyzes Type</text>
    <text x="70" y="66" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Chat vs Tool</text>
  </g>

  <!-- Pre-Warm Background Job -->
  <g transform="translate(440, 440)">
    <rect width="180" height="70" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4 4" filter="url(#shadow)" />
    <path d="M 0 8 Q 0 0 8 0 L 172 0 Q 180 0 180 8 L 180 26 L 0 26 Z" fill="#58a6ff" opacity="0.2"/>
    <text x="90" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle" letter-spacing="0.5">ASYNC PRE-WARM</text>
    <text x="90" y="44" font-family="system-ui, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="middle">Loads CPU Model</text>
    <text x="90" y="60" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Hides 45s Latency</text>
  </g>

  <!-- NPU Generation -->
  <g transform="translate(700, 140)" filter="url(#glowGreen)">
    <rect width="220" height="110" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2" />
    <path d="M 0 8 Q 0 0 8 0 L 212 0 Q 220 0 220 8 L 220 28 L 0 28 Z" fill="#3fb950" opacity="0.2"/>
    <text x="110" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3fb950" text-anchor="middle" letter-spacing="1">NPU GENERATION TIER</text>
    <text x="110" y="48" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#c9d1d9" text-anchor="middle">Qwen3-1.7B / 2.5-3B</text>
    <text x="110" y="68" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">CMA Memory Bound (2.2GB)</text>
    <rect x="60" y="80" width="100" height="20" rx="4" fill="#3fb950" opacity="0.1" />
    <text x="110" y="94" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">Speed: ~6.7 tok/s</text>
  </g>

  <!-- CPU Generation -->
  <g transform="translate(700, 400)" filter="url(#glowBlue)">
    <rect width="220" height="110" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2" />
    <path d="M 0 8 Q 0 0 8 0 L 212 0 Q 220 0 220 8 L 220 28 L 0 28 Z" fill="#58a6ff" opacity="0.2"/>
    <text x="110" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle" letter-spacing="1">CPU GENERATION TIER</text>
    <text x="110" y="48" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#c9d1d9" text-anchor="middle">Qwen3.5-4B (Q4_K_M)</text>
    <text x="110" y="68" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Complex Logic / Reasoning</text>
    <rect x="40" y="80" width="140" height="20" rx="4" fill="#58a6ff" opacity="0.1" />
    <text x="110" y="94" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle">Hermes Native Tools</text>
  </g>

  <!-- System / Environment Flags -->
  <g transform="translate(220, 535)">
    <rect width="700" height="30" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    
    <rect x="10" y="7" width="4" height="16" rx="2" fill="#58a6ff" />
    <text x="22" y="21" font-family="monospace" font-size="11" fill="#8b949e">FLASH_ATTN=<tspan fill="#c9d1d9">on</tspan></text>
    
    <rect x="160" y="7" width="4" height="16" rx="2" fill="#3fb950" />
    <text x="172" y="21" font-family="monospace" font-size="11" fill="#8b949e">NPU_KEEPALIVE=<tspan fill="#c9d1d9">true</tspan></text>

    <rect x="330" y="7" width="4" height="16" rx="2" fill="#d29922" />
    <text x="342" y="21" font-family="monospace" font-size="11" fill="#8b949e">PREWARM_CPU=<tspan fill="#c9d1d9">true</tspan></text>

    <rect x="490" y="7" width="4" height="16" rx="2" fill="#bc8cff" />
    <text x="502" y="21" font-family="monospace" font-size="11" fill="#8b949e">PARALLEL_TOOLS=<tspan fill="#f85149">false</tspan></text>
  </g>

</svg>