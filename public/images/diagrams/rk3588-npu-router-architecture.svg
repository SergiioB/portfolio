<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <linearGradient id="npuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keepaliveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prewarmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prewarmBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#02070c" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">RK3588 NPU Router Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Tiered Inference with Ultra-Fast NPU Routing and Background Pre-Warming</text>
  
  <!-- NPU Router Section (Top) -->
  <rect x="300" y="80" width="300" height="120" rx="12" fill="url(#routerGrad)" filter="url(#shadow)"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="white">NPU Router Layer</text>
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">Intent Classification</text>
  
  <!-- TinyLlama Box -->
  <rect x="50" y="230" width="180" height="140" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="140" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#065f46">TinyLlama 1.1B</text>
  <text x="140" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#059669">W8A8 NPU</text>
  <rect x="70" y="295" width="140" height="28" rx="6" fill="#10b981"/>
  <text x="140" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">15 tok/s</text>
  <text x="140" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Priority: 110</text>
  <text x="140" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Memory: 1.5GB</text>
  
  <!-- Qwen3-1.7B Box -->
  <rect x="260" y="230" width="180" height="140" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="350" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#065f46">Qwen3-1.7B</text>
  <text x="350" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#059669">W8A8 NPU</text>
  <rect x="280" y="295" width="140" height="28" rx="6" fill="#10b981" opacity="0.7"/>
  <text x="350" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">6.7 tok/s</text>
  <text x="350" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Priority: 100</text>
  <text x="350" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Memory: 2.5GB</text>
  
  <!-- Qwen2.5-3B Box -->
  <rect x="470" y="230" width="180" height="140" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="560" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#065f46">Qwen2.5-3B</text>
  <text x="560" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#059669">W8A8 NPU</text>
  <rect x="490" y="295" width="140" height="28" rx="6" fill="#10b981" opacity="0.5"/>
  <text x="560" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">5.7 tok/s</text>
  <text x="560" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Priority: 80</text>
  <text x="560" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Memory: 3.6GB</text>
  
  <!-- CPU Model Box -->
  <rect x="670" y="230" width="180" height="140" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="760" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Qwen3.5-4B</text>
  <text x="760" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Q4_K_M CPU</text>
  <rect x="690" y="295" width="140" height="28" rx="6" fill="#3b82f6"/>
  <text x="760" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">2.4 tok/s</text>
  <text x="760" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Priority: 104</text>
  <text x="760" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Memory: 2.8GB</text>
  
  <!-- Arrows from NPU boxes to router -->
  <line x1="140" y1="210" x2="380" y2="150" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="210" x2="420" y2="170" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="210" x2="480" y2="170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="760" y1="210" x2="540" y2="160" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Keepalive Section (Middle) -->
  <rect x="50" y="410" width="380" height="130" rx="10" fill="url(#keepaliveGrad)" filter="url(#shadow)"/>
  <text x="240" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">NPU Keepalive</text>
  <text x="240" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e9d5ff">Prevents CMA Memory Eviction</text>
  <rect x="70" y="480" width="160" height="45" rx="8" fill="#7c3aed" opacity="0.3"/>
  <text x="150" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7c3aed">Interval: 30s</text>
  <text x="150" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9">Ping: "." → 1 token</text>
  <rect x="250" y="480" width="160" height="45" rx="8" fill="#7c3aed" opacity="0.3"/>
  <text x="330" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7c3aed">Timeout: 5s</text>
  <text x="330" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9">Non-blocking</text>
  
  <!-- Pre-warm Section (Right Middle) -->
  <rect x="470" y="410" width="380" height="130" rx="10" fill="url(#prewarmGrad)" filter="url(#shadow)"/>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">Background Pre-Warm</text>
  <text x="660" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fce7f3">Hides CPU Model Cold-Start</text>
  <rect x="490" y="480" width="160" height="45" rx="8" fill="#db2777" opacity="0.3"/>
  <text x="570" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#db2777">Pre-warm CPU</text>
  <text x="570" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#be185d">After routing decision</text>
  <rect x="670" y="480" width="160" height="45" rx="8" fill="#db2777" opacity="0.3"/>
  <text x="750" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#db2777">Cold: 45s → 0s</text>
  <text x="750" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#be185d">Hidden by routing</text>
  
  <!-- Flow Diagram (Bottom) -->
  <rect x="50" y="570" width="800" height="110" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="595" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#334155">Request Flow</text>
  
  <!-- Flow boxes -->
  <rect x="70" y="610" width="100" height="50" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="120" y="635" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#475569">Query</text>
  <text x="120" y="652" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">User Input</text>
  
  <line x1="170" y1="635" x2="230" y2="635" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="230" y="610" width="120" height="50" rx="8" fill="url(#routerGrad)"/>
  <text x="290" y="635" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">NPU Router</text>
  <text x="290" y="652" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d1fae5">&lt;50ms TinyLlama</text>
  
  <line x1="350" y1="635" x2="410" y2="635" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="410" y="610" width="120" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="635" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Intent Classify</text>
  <text x="470" y="652" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">CHAT/TOOL/CODE</text>
  
  <line x1="530" y1="635" x2="590" y2="635" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="590" y="610" width="120" height="50" rx="8" fill="url(#prewarmGrad)"/>
  <text x="650" y="635" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">Pre-Warm CPU</text>
  <text x="650" y="652" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fce7f3">Background</text>
  
  <line x1="710" y1="635" x2="770" y2="635" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="770" y="610" width="60" height="50" rx="8" fill="#10b981"/>
  <text x="800" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">Done</text>
  
  <!-- Legend -->
  <rect x="50" y="85" width="180" height="20" rx="4" fill="#f1f5f9"/>
  <text x="60" y="99" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">▲ Priority: higher = preferred router</text>
  
  <!-- Performance callout -->
  <rect x="670" y="85" width="180" height="35" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="760" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#92400e">2.2x faster routing</text>
  <text x="760" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">TinyLlama vs Qwen3-1.7B</text>
</svg>
