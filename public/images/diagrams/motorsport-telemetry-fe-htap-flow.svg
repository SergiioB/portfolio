<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081019"/>
      <stop offset="100%" stop-color="#111c2b"/>
    </linearGradient>
    <linearGradient id="gcp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="50%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>
    <filter id="pulse" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7ad7ff"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="24" fill="url(#bg2)"/>
  <text x="600" y="48" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Formula E Google Cloud Telemetry: Edge Buffering, Stream Windows, and HTAP Reads</text>
  <text x="600" y="76" fill="#adc4df" font-family="Arial" font-size="14" text-anchor="middle">Detailed map of burst recovery on city circuits, including Pub/Sub ingestion, Dataflow windowing, AlloyDB live state, BigQuery history, and Vertex AI coaching.</text>

  <g transform="translate(36,112)">
    <rect width="232" height="220" rx="18" fill="#172231" stroke="#49d6ff" stroke-width="2"/>
    <text x="116" y="34" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">GEN3 Evo Edge Stack</text>
    <text x="116" y="58" fill="#cad9ef" font-family="Arial" font-size="12" text-anchor="middle">Battery, inverter, regen, wheel torque, GPS</text>
    <rect x="24" y="86" width="184" height="28" rx="8" fill="#0e1623" stroke="#49d6ff"/>
    <text x="116" y="105" fill="#8be8ff" font-family="Courier New" font-size="11" text-anchor="middle">Local ring buffer for signal dropout</text>
    <rect x="24" y="126" width="184" height="18" rx="9" fill="#0e1623"/>
    <rect x="24" y="126" width="36" height="18" rx="9" fill="#49d6ff">
      <animate attributeName="width" values="30;170;184;90;36" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="116" y="165" fill="#ffd780" font-family="Arial" font-size="12" text-anchor="middle">Burst replay after urban RF recovery</text>
    <text x="116" y="190" fill="#adc4df" font-family="Arial" font-size="12" text-anchor="middle">Data focus: SoC, thermal envelopes, AWD pulses</text>
    <text x="116" y="214" fill="#adc4df" font-family="Arial" font-size="12" text-anchor="middle">Temporary storage avoids packet loss</text>
  </g>

  <g transform="translate(318,112)">
    <rect width="206" height="220" rx="18" fill="#172231" stroke="#49d6ff" stroke-width="2"/>
    <text x="103" y="34" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">City Gateway</text>
    <text x="103" y="58" fill="#cad9ef" font-family="Arial" font-size="12" text-anchor="middle">Trackside collection + secure uplink</text>
    <rect x="24" y="88" width="158" height="26" rx="8" fill="#0e1623" stroke="#72ffd8"/>
    <text x="103" y="106" fill="#72ffd8" font-family="Courier New" font-size="11" text-anchor="middle">Cloud Run / gateway service</text>
    <rect x="24" y="126" width="158" height="26" rx="8" fill="#0e1623" stroke="#72ffd8"/>
    <text x="103" y="144" fill="#72ffd8" font-family="Courier New" font-size="11" text-anchor="middle">Authenticates + batches bursts</text>
    <circle cx="52" cy="184" r="6" fill="#00f5a0">
      <animate attributeName="cx" values="52;154;52" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="103" y="214" fill="#adc4df" font-family="Arial" font-size="12" text-anchor="middle">Handles intermittent metro topology</text>
  </g>

  <path d="M 268 222 L 318 222" stroke="#7ad7ff" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <text x="293" y="206" fill="#7ad7ff" font-family="Arial" font-size="12" text-anchor="middle">replayed bursts</text>

  <g transform="translate(566,86)">
    <rect width="594" height="296" rx="20" fill="none" stroke="url(#gcp)" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="297" y="30" fill="#ffffff" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Google Cloud Event + HTAP Plane</text>

    <g transform="translate(24,62)">
      <rect width="146" height="194" rx="16" fill="#162130" stroke="#4285F4" stroke-width="2"/>
      <text x="73" y="30" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Pub/Sub</text>
      <text x="73" y="52" fill="#bfd1ea" font-family="Arial" font-size="11" text-anchor="middle">Durable topic + subscriber fan-out</text>
      <rect x="24" y="74" width="98" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <rect x="24" y="108" width="98" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <rect x="24" y="142" width="98" height="18" rx="9" fill="#0e1623" stroke="#6eb3ff"/>
      <circle cx="32" cy="83" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="32;112;32" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="112" cy="117" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="112;32;112" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="54" cy="151" r="4" fill="#6eb3ff">
        <animate attributeName="cx" values="54;112;54" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="73" y="184" fill="#adc4df" font-family="Arial" font-size="11" text-anchor="middle">Absorbs asynchronous catch-up traffic</text>
    </g>

    <g transform="translate(194,62)">
      <rect width="158" height="194" rx="16" fill="#162130" stroke="#34A853" stroke-width="2"/>
      <text x="79" y="30" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Dataflow</text>
      <text x="79" y="52" fill="#bfd1ea" font-family="Arial" font-size="11" text-anchor="middle">Apache Beam streaming graph</text>
      <rect x="24" y="78" width="110" height="18" rx="9" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="79" y="91" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">window()</text>
      <rect x="24" y="110" width="110" height="18" rx="9" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="79" y="123" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">normalize()</text>
      <rect x="24" y="142" width="110" height="18" rx="9" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="79" y="155" fill="#6ef7a5" font-family="Courier New" font-size="10" text-anchor="middle">drop-noise()</text>
      <text x="79" y="184" fill="#adc4df" font-family="Arial" font-size="11" text-anchor="middle">Late data + watermark management</text>
    </g>

    <g transform="translate(376,50)">
      <rect width="170" height="92" rx="16" fill="#162130" stroke="#EA4335" stroke-width="2" filter="url(#pulse)"/>
      <text x="85" y="30" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">AlloyDB</text>
      <text x="85" y="52" fill="#ffd0cb" font-family="Arial" font-size="11" text-anchor="middle">Transactional writes + columnar analytics</text>
      <text x="85" y="72" fill="#bfd1ea" font-family="Courier New" font-size="10" text-anchor="middle">live_race_state + analytical scans</text>
    </g>

    <g transform="translate(376,162)">
      <rect width="170" height="94" rx="16" fill="#162130" stroke="#F4B400" stroke-width="2"/>
      <text x="85" y="30" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">BigQuery</text>
      <text x="85" y="52" fill="#ffe59a" font-family="Arial" font-size="11" text-anchor="middle">Historical race lake / perfect-lap corpus</text>
      <text x="85" y="72" fill="#bfd1ea" font-family="Courier New" font-size="10" text-anchor="middle">season-scale feature warehouse</text>
    </g>

    <g transform="translate(566,86)">
      <rect width="150" height="170" rx="16" fill="#162130" stroke="#34A853" stroke-width="2" filter="url(#pulse)">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="75" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Vertex AI</text>
      <text x="75" y="52" fill="#6ef7a5" font-family="Arial" font-size="11" text-anchor="middle">Gemini multimodal reasoning</text>
      <rect x="20" y="72" width="110" height="22" rx="11" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="75" y="87" fill="#bbffd3" font-family="Courier New" font-size="10" text-anchor="middle">live telemetry context</text>
      <rect x="20" y="104" width="110" height="22" rx="11" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="75" y="119" fill="#bbffd3" font-family="Courier New" font-size="10" text-anchor="middle">track map + elevation</text>
      <rect x="20" y="136" width="110" height="22" rx="11" fill="#0e1623" stroke="#6ef7a5"/>
      <text x="75" y="151" fill="#bbffd3" font-family="Courier New" font-size="10" text-anchor="middle">historical lap vectors</text>
    </g>
  </g>

  <path d="M 524 222 L 590 222" stroke="#7ad7ff" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <text x="556" y="206" fill="#7ad7ff" font-family="Arial" font-size="12" text-anchor="middle">secured uplink</text>
  <path d="M 736 246 L 736 420" stroke="#34A853" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>
  <path d="M 736 420 L 1010 420" stroke="#34A853" stroke-width="4" marker-end="url(#arrow2)" fill="none"/>

  <g transform="translate(874,374)">
    <rect width="280" height="128" rx="18" fill="#172231" stroke="#34A853" stroke-width="2"/>
    <text x="140" y="30" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Engineer / Driver Coaching Output</text>
    <text x="140" y="56" fill="#bbffd3" font-family="Arial" font-size="12" text-anchor="middle">Actionable timing, lift-and-coast, regen, attack-mode advice</text>
    <rect x="24" y="74" width="232" height="28" rx="10" fill="#0f2b1b" stroke="#34A853"/>
    <text x="140" y="92" fill="#caffd7" font-family="Courier New" font-size="10" text-anchor="middle">"Lift 10m earlier at Turn 4; projected SoC recovery +2%"</text>
  </g>

  <g transform="translate(36,530)">
    <rect width="1128" height="194" rx="20" fill="#0d1623" stroke="#29456c" stroke-width="2"/>
    <text x="564" y="34" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Legend and technical interpretation</text>
    <g fill="#cad9ef" font-family="Arial" font-size="14">
      <text x="24" y="72">• GEN3 Evo Edge Stack: local telemetry buffering on the car protects against RF shadows created by buildings, grandstands, and urban channel interference.</text>
      <text x="24" y="104">• City Gateway: the first reliable aggregation point. It re-establishes continuity, authenticates uploads, and repackages delayed bursts for cloud transit.</text>
      <text x="24" y="136">• Pub/Sub: managed event transport that decouples producers from consumers and handles uneven arrival patterns caused by reconnect events.</text>
      <text x="24" y="168">• Dataflow: streaming ETL with event-time windows, watermarks, transforms, and anomaly filtering before writes reach persistent storage.</text>
      <text x="24" y="200">• AlloyDB: HTAP-style serving layer; one side handles live transactional state, the columnar engine accelerates analytical reads on that same race context.</text>
      <text x="24" y="232">• BigQuery: deep historical layer for season-level baselines, ideal lap references, and model training / comparison datasets.</text>
      <text x="24" y="264">• Vertex AI with Gemini: multimodal reasoning engine combining current telemetry, spatial track knowledge, and historical performance to issue guidance.</text>
    </g>
  </g>
</svg>