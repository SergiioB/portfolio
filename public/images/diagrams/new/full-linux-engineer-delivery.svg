<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1840" viewBox="0 0 2200 1840" role="img" aria-label="Linux Engineer Command List — Advanced Administration poster">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111d" />
      <stop offset="55%" stop-color="#0c1828" />
      <stop offset="100%" stop-color="#050b14" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5b87" />
      <stop offset="50%" stop-color="#2f7f8a" />
      <stop offset="100%" stop-color="#4d8d51" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#02060d" flood-opacity="0.42" />
    </filter>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #f4f8ff; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #a4b6c8; }
      .badge { font: 700 18px "Consolas", "Courier New", monospace; fill: #8edcff; letter-spacing: 2px; }
      .panel { fill: rgba(10, 20, 33, 0.94); stroke: url(#stroke); stroke-width: 2; }
      .panel-title { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #f6fbff; }
      .panel-copy { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #99aec0; }
      .label { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #7bc7ff; letter-spacing: 1px; }
      .cmd { font: 400 15px "Consolas", "Courier New", monospace; fill: #9ef2bf; }
      .cmd-alt { font: 400 15px "Consolas", "Courier New", monospace; fill: #8dd9ff; }
      .small { font: 400 14px "Consolas", "Courier New", monospace; fill: #90a5b6; }
      .chip { fill: #0b1f31; stroke: #275676; stroke-width: 1.2; }
      .grid { stroke: rgba(120, 162, 190, 0.08); stroke-width: 1; }
      .rule { stroke: rgba(120, 170, 201, 0.18); stroke-width: 1; }
      .cmd-box { fill: #091524; stroke: rgba(85, 141, 182, 0.25); stroke-width: 1; }
    </style>
  </defs>

<rect width="2200" height="1840" fill="url(#bg)" />
<g opacity="0.22">
<path d="M0 180h2200M0 400h2200M0 620h2200M0 840h2200M0 1060h2200M0 1280h2200M0 1500h2200M0 1720h2200" class="grid" />
<path d="M150 0v1840M410 0v1840M670 0v1840M930 0v1840M1190 0v1840M1450 0v1840M1710 0v1840M1970 0v1840" class="grid" />
</g>
<circle cx="1930" cy="180" r="180" fill="#123257" opacity="0.16" />
<circle cx="260" cy="1720" r="220" fill="#193b24" opacity="0.14" />
<g transform="translate(90 84)">
<rect x="0" y="0" width="580" height="44" rx="22" class="chip" />
<text x="24" y="29" class="badge">LINUX ENGINEERING / ADMINISTRATION</text>
<text x="0" y="104" class="title">Linux Engineer Command List — Advanced Administration</text>
<text x="0" y="142" class="subtitle">Deep dive into networking, storage operations, secure user management, and automated certificate generation.</text>
</g>
<g filter="url(#shadow)">
<g transform="translate(90 310)">
<rect width="970" height="740" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">1. Advanced Network Troubleshooting & Automation</text>
<text x="34" y="86" class="panel-copy">Tools for deep packet inspection, service listening state, port mapping, and triggering Ansible network tags.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">NETWORK OPERATIONS</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">ip -br a</text>
<rect x="34" y="204" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="228" class="cmd-alt">ss -tulpn | grep LISTEN</text>
<rect x="34" y="256" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="280" class="cmd">tcpdump -i eth0 -n port 80 or port 443</text>
<rect x="34" y="308" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="332" class="cmd-alt">nmap -p 1-65535 -T4 -A -v target-host</text>
<rect x="34" y="360" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="384" class="cmd">ansible-playbook -i inventory/prod deploy.yml --tags &quot;network&quot;</text>
<rect x="34" y="412" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="436" class="cmd-alt">iperf3 -c server.local -t 30 -P 4</text>
<rect x="34" y="464" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="488" class="cmd">traceroute -T -p 443 app.example.com</text>
<rect x="34" y="516" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="540" class="cmd-alt">netstat -natp | awk '{print $6}' | sort | uniq -c</text>
</g>
<g transform="translate(1140 310)">
<rect width="970" height="740" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">2. Sudoers, Users & Jobs Management</text>
<text x="34" y="86" class="panel-copy">Commands for robust user administration, safely editing sudoers with syntax checking, and verifying scheduled jobs/timers.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">USER & SYSTEM JOBS</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">usermod -aG wheel,docker,adm svc_user</text>
<rect x="34" y="204" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="228" class="cmd-alt">visudo -c -f /etc/sudoers.d/custom_rules</text>
<rect x="34" y="256" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="280" class="cmd">echo &quot;svc_user ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart sas-viya&quot; &gt; /etc/sudoers.d/sas</text>
<rect x="34" y="308" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="332" class="cmd-alt">usermod -e $(date -d &quot;1 year&quot; +%Y-%m-%d) temp_user</text>
<rect x="34" y="360" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="384" class="cmd">systemctl list-timers --all</text>
<rect x="34" y="412" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="436" class="cmd-alt">crontab -u b_t_sasrp_scheduler -e</text>
<rect x="34" y="464" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="488" class="cmd">chage -l svc_user</text>
<rect x="34" y="516" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="540" class="cmd-alt">sudo -l -U svc_user</text>
</g>
<g transform="translate(90 1020)">
<rect width="970" height="740" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">3. Silent Installers & Certificates</text>
<text x="34" y="86" class="panel-copy">Running silent deployment wizards (like SAS) and generating SSL/TLS CSRs with SANs cleanly separated.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">INSTALLATION & SSL</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">/opt/software/setup.sh -silent -responsefile response.properties -skiposlevelcheck</text>
<rect x="34" y="204" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="228" class="cmd-alt">openssl req -new -newkey rsa:2048 -nodes \</text>
<rect x="34" y="256" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="280" class="cmd">  -keyout host_vars/server/.files/tls_cert.key \</text>
<rect x="34" y="308" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="332" class="cmd-alt">  -out server.csr \</text>
<rect x="34" y="360" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="384" class="cmd">  -subj &quot;/C=DE/ST=State/L=City/O=Company/OU=Dept/CN=server.local&quot; \</text>
<rect x="34" y="412" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="436" class="cmd-alt">  -addext &quot;subjectAltName = DNS:server.local, DNS:server&quot;</text>
<rect x="34" y="464" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="488" class="cmd">openssl x509 -req -in server.csr -signkey tls_cert.key -out server.crt -days 365</text>
<rect x="34" y="516" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="540" class="cmd-alt">openssl x509 -in server.crt -text -noout | grep -A 1 &quot;Subject Alternative Name&quot;</text>
</g>
<g transform="translate(1140 1020)">
<rect width="970" height="740" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">4. System Performance & Storage Operations</text>
<text x="34" y="86" class="panel-copy">Full LVM expansion sequence (rescan to resize), block device listing, and advanced process monitoring.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">STORAGE EXPANSION & LVM</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">lsblk -o NAME,FSTYPE,SIZE,MOUNTPOINT,LABEL</text>
<rect x="34" y="204" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="228" class="cmd-alt">echo 1 &gt; /sys/class/scsi_device/0:0:0:0/device/rescan</text>
<rect x="34" y="256" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="280" class="cmd">pvresize /dev/sdb</text>
<rect x="34" y="308" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="332" class="cmd-alt">lvextend -r -L +50G /dev/mapper/vg0-lv_app</text>
<rect x="34" y="360" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="384" class="cmd">htop -d 10 -s PERCENT_CPU</text>
<rect x="34" y="412" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="436" class="cmd-alt">strace -c -p $(pgrep -n apache2)</text>
<rect x="34" y="464" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="488" class="cmd">iostat -xz 1</text>
<rect x="34" y="516" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="540" class="cmd-alt">df -hT</text>
</g>
</g>
</svg>