<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1840" viewBox="0 0 2200 1840" role="img" aria-label="Linux Engineer Command List — Testing, Git, and Utilities poster">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111d" />
      <stop offset="55%" stop-color="#0c1828" />
      <stop offset="100%" stop-color="#050b14" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5b87" />
      <stop offset="50%" stop-color="#2f7f8a" />
      <stop offset="100%" stop-color="#4d8d51" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#02060d" flood-opacity="0.42" />
    </filter>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #f4f8ff; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #a4b6c8; }
      .badge { font: 700 18px "Consolas", "Courier New", monospace; fill: #8edcff; letter-spacing: 2px; }
      .panel { fill: rgba(10, 20, 33, 0.94); stroke: url(#stroke); stroke-width: 2; }
      .panel-title { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #f6fbff; }
      .panel-copy { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #99aec0; }
      .label { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #7bc7ff; letter-spacing: 1px; }
      .cmd { font: 400 15px "Consolas", "Courier New", monospace; fill: #9ef2bf; }
      .cmd-alt { font: 400 15px "Consolas", "Courier New", monospace; fill: #8dd9ff; }
      .small { font: 400 14px "Consolas", "Courier New", monospace; fill: #90a5b6; }
      .chip { fill: #0b1f31; stroke: #275676; stroke-width: 1.2; }
      .grid { stroke: rgba(120, 162, 190, 0.08); stroke-width: 1; }
      .rule { stroke: rgba(120, 170, 201, 0.18); stroke-width: 1; }
      .cmd-box { fill: #091524; stroke: rgba(85, 141, 182, 0.25); stroke-width: 1; }
    </style>
  </defs>

<rect width="2200" height="1840" fill="url(#bg)" />
<g opacity="0.22">
<path d="M0 180h2200M0 400h2200M0 620h2200M0 840h2200M0 1060h2200M0 1280h2200M0 1500h2200M0 1720h2200" class="grid" />
<path d="M150 0v1840M410 0v1840M670 0v1840M930 0v1840M1190 0v1840M1450 0v1840M1710 0v1840M1970 0v1840" class="grid" />
</g>
<circle cx="1930" cy="180" r="180" fill="#123257" opacity="0.16" />
<circle cx="260" cy="1720" r="220" fill="#193b24" opacity="0.14" />
<g transform="translate(90 84)">
<rect x="0" y="0" width="470" height="44" rx="22" class="chip" />
<text x="24" y="29" class="badge">DELIVERY / GIT / UTILITIES</text>
<text x="0" y="104" class="title">Linux Engineer Command List — Testing, Git, and Utilities</text>
<text x="0" y="142" class="subtitle">Molecule scenario loops, safe Git refresh flow, silent installer execution, certificates, Vim cleanup, symlinks, and cron reminders.</text>
</g>
<g filter="url(#shadow)">
<g transform="translate(90 310)">
<rect width="970" height="620" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">1. Molecule scenario loop</text>
<text x="34" y="86" class="panel-copy">Reset, create, converge, and then log in to inspect the created instance.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">ROLE TEST CYCLE</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">molecule list</text>
<rect x="34" y="208" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="232" class="cmd-alt">molecule destroy -s default</text>
<rect x="34" y="264" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="288" class="cmd">molecule create -s default</text>
<rect x="34" y="320" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="344" class="cmd-alt">molecule converge -s default</text>
<rect x="34" y="376" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="400" class="cmd">molecule login -s default</text>
</g>
<g transform="translate(1140 310)">
<rect width="970" height="620" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">2. Git recovery sequence</text>
<text x="34" y="86" class="panel-copy">The smallest safe sequence for refreshing a feature branch from main.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">CONTROLLED MERGE FLOW</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">git stash</text>
<rect x="34" y="208" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="232" class="cmd-alt">git checkout main</text>
<rect x="34" y="264" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="288" class="cmd">git pull</text>
<rect x="34" y="320" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="344" class="cmd-alt">git checkout feature-branch</text>
<rect x="34" y="376" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="400" class="cmd">git merge main</text>
<rect x="34" y="432" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="456" class="cmd-alt">git stash pop</text>
<rect x="34" y="488" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="512" class="cmd">git add</text>
</g>
<g transform="translate(90 980)">
<rect width="970" height="760" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">3. Silent installers and certificates</text>
<text x="34" y="86" class="panel-copy">Run silent installers when the software stack needs non-interactive deployment, then generate CSRs when cert work lands on the same day.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">INSTALLERS AND CERTS</text>
<rect x="34" y="152" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">/opt/software-depot/setup.sh -silent -responsefile</text>
<text x="50" y="196" class="cmd">/opt/software-depot/response.properties -skiposlevelcheck</text>
<rect x="34" y="228" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="252" class="cmd-alt">openssl req -new -newkey rsa:2048 -nodes</text>
<rect x="34" y="284" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="308" class="cmd">-keyout files/target-host/tls.key -out files/target-host/tls.csr</text>
<rect x="34" y="340" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="364" class="cmd-alt">-subj &quot;/C=DE/ST=State/L=City/O=Example</text>
<text x="50" y="384" class="cmd-alt">Corp/OU=Platform/CN=app.example.internal&quot;</text>
<rect x="34" y="416" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="440" class="cmd">-addext &quot;subjectAltName = DNS:app.example.internal,DNS:target-host.example.i</text>
<text x="50" y="460" class="cmd">nternal,DNS:target-host&quot;</text>
</g>
<g transform="translate(1140 980)">
<rect width="970" height="760" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">4. Quick editor, symlink, and cron fixes</text>
<text x="34" y="86" class="panel-copy">Tiny commands that prevent surprisingly large mistakes in file layout, text cleanup, or scheduled jobs.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">SMALL BUT IMPORTANT</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">:%s/\s\+$//e</text>
<rect x="34" y="208" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="232" class="cmd-alt">:%s/old-token/new-token/g</text>
<rect x="34" y="264" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="288" class="cmd">ln -s /etc/opt/vendor/app /apps/app</text>
<rect x="34" y="320" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="344" class="cmd-alt">unlink /apps/app</text>
<rect x="34" y="376" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="400" class="cmd">crontab -u svc_user -e</text>
<rect x="34" y="432" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="456" class="cmd-alt">crontab -u svc_user -l</text>
<rect x="34" y="488" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="512" class="cmd">6 14 * * * /usr/bin/systemctl restart example-service</text>
</g>
</g>
</svg>