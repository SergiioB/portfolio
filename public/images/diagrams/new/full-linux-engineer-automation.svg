<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1878" viewBox="0 0 2200 1878" role="img" aria-label="Linux Engineer Command List — Python, Ansible, and DB poster">\n
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111d" />
      <stop offset="55%" stop-color="#0c1828" />
      <stop offset="100%" stop-color="#050b14" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5b87" />
      <stop offset="50%" stop-color="#2f7f8a" />
      <stop offset="100%" stop-color="#4d8d51" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#02060d" flood-opacity="0.42" />
    </filter>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #f4f8ff; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #a4b6c8; }
      .badge { font: 700 18px "Consolas", "Courier New", monospace; fill: #8edcff; letter-spacing: 2px; }
      .panel { fill: rgba(10, 20, 33, 0.94); stroke: url(#stroke); stroke-width: 2; }
      .panel-title { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #f6fbff; }
      .panel-copy { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #99aec0; }
      .label { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #7bc7ff; letter-spacing: 1px; }
      .cmd { font: 400 15px "Consolas", "Courier New", monospace; fill: #9ef2bf; }
      .cmd-alt { font: 400 15px "Consolas", "Courier New", monospace; fill: #8dd9ff; }
      .small { font: 400 14px "Consolas", "Courier New", monospace; fill: #90a5b6; }
      .chip { fill: #0b1f31; stroke: #275676; stroke-width: 1.2; }
      .grid { stroke: rgba(120, 162, 190, 0.08); stroke-width: 1; }
      .rule { stroke: rgba(120, 170, 201, 0.18); stroke-width: 1; }
      .cmd-box { fill: #091524; stroke: rgba(85, 141, 182, 0.25); stroke-width: 1; }
    </style>
  </defs>
\n<rect width="2200" height="1878" fill="url(#bg)" />\n<g opacity="0.22">\n<path d="M0 180h2200M0 400h2200M0 620h2200M0 840h2200M0 1060h2200M0 1280h2200M0 1500h2200M0 1720h2200" class="grid" />\n<path d="M150 0v1878M410 0v1878M670 0v1878M930 0v1878M1190 0v1878M1450 0v1878M1710 0v1878M1970 0v1878" class="grid" />\n</g>\n<circle cx="1930" cy="180" r="180" fill="#123257" opacity="0.16" />\n<circle cx="260" cy="1758" r="220" fill="#193b24" opacity="0.14" />\n<g transform="translate(90 84)">\n<rect x="0" y="0" width="540" height="44" rx="22" class="chip" />\n<text x="24" y="29" class="badge">AUTOMATION / PYTHON / DATABASE</text>\n<text x="0" y="104" class="title">Linux Engineer Command List — Python, Ansible, and DB</text>\n<text x="0" y="142" class="subtitle">Python environments, playbook runs, dry-runs, Vault workflows, and PostgreSQL SELinux fixes.</text>\n</g>\n<g filter="url(#shadow)">\n<g transform="translate(90 310)">\n<rect width="970" height="590" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">1. Bootstrap the Python environment</text>\n<text x="34" y="86" class="panel-copy">Create the virtual environment first so repository dependencies stay isolated. Manage</text>\n<text x="34" y="108" class="panel-copy">requirements effectively.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">PYTHON BOOTSTRAP</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">python3.12 -m venv .venv</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">source .venv/bin/activate</text>\n<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">python -m pip install --upgrade pip</text>\n<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="366" class="cmd-alt">pip install -r requirements.txt</text>\n<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="422" class="cmd">pip freeze &gt; requirements.txt</text>\n<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="478" class="cmd-alt">pip list --outdated</text>\n<rect x="34" y="510" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="534" class="cmd">python3.12 -m http.server 8080</text>\n</g>\n<g transform="translate(1140 310)">\n<rect width="970" height="614" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">2. Common Ansible execution patterns</text>\n<text x="34" y="86" class="panel-copy">These are the real playbook commands that repeatedly appear during provisioning, follow-up</text>\n<text x="34" y="108" class="panel-copy">fixes, and safe dry-runs.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">PLAYBOOK RUNS</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">ansible-playbook --check --diff playbook.yml</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">ansible-playbook playbook.yml --step</text>\n<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">ansible-inventory -i inventory/stage/ --graph</text>\n<rect x="34" y="342" width="902" height="64" rx="12" class="cmd-box" />\n<text x="50" y="366" class="cmd-alt">ansible-playbook -i inventory/lab/ playbooks/platform-bootstrap.yml</text>\n<text x="50" y="386" class="cmd-alt">--limit='target-host' -t app_db_client</text>\n<rect x="34" y="418" width="902" height="84" rx="12" class="cmd-box" />\n<text x="50" y="442" class="cmd">ansible-playbook -i inventory/stage/ playbooks/platform-bootstrap.yml</text>\n<text x="50" y="462" class="cmd">--limit='target-host' -t common_usersetup,common_filesystems,common_rhel,com</text>\n<text x="50" y="482" class="cmd">mon_security</text>\n<rect x="34" y="514" width="902" height="64" rx="12" class="cmd-box" />\n<text x="50" y="538" class="cmd-alt">ansible-playbook -i inventory/stage/ playbooks/app_postgresql_prereqs.yml</text>\n<text x="50" y="558" class="cmd-alt">--limit='target-host'</text>\n</g>\n<g transform="translate(90 940)">\n<rect width="970" height="838" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">3. Galaxy, Vault, and ad-hoc debugging</text>\n<text x="34" y="86" class="panel-copy">Use these when installing dependencies, managing secrets, or validating infrastructure states</text>\n<text x="34" y="108" class="panel-copy">directly.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">ANSIBLE CORE</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">ansible-galaxy install -r requirements.yml</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">ansible-galaxy install -r roles/platform_role/collections/requirements.yml</text>\n<rect x="34" y="286" width="902" height="64" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">pip install -r collections/ansible_collections/community/general/requirement</text>\n<text x="50" y="330" class="cmd">s.yml</text>\n<rect x="34" y="362" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="386" class="cmd-alt">ansible-vault encrypt_string --stdin-name 'service_secret'</text>\n<rect x="34" y="418" width="902" height="64" rx="12" class="cmd-box" />\n<text x="50" y="442" class="cmd">ansible-vault encrypt files/target-host/tls.key --vault-password-file</text>\n<text x="50" y="462" class="cmd">~/.secure/vault/platform.pass --encrypt-vault-id default</text>\n<rect x="34" y="494" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="518" class="cmd-alt">ansible-vault rekey files/target-host/tls.key</text>\n<rect x="34" y="550" width="902" height="64" rx="12" class="cmd-box" />\n<text x="50" y="574" class="cmd">ansible-vault decrypt files/target-host/tls.crt --vault-password-file</text>\n<text x="50" y="594" class="cmd">~/.secure/vault/platform.pass</text>\n<rect x="34" y="626" width="902" height="64" rx="12" class="cmd-box" />\n<text x="50" y="650" class="cmd-alt">ansible localhost -m debug -a &quot;var=vault_secret_name&quot; -e</text>\n<text x="50" y="670" class="cmd-alt">&quot;@inventory/lab/group_vars/all/secret_vars.yml&quot; --ask-vault-pass</text>\n<rect x="34" y="702" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="726" class="cmd">ansible all -m ping -i inventory/lab/</text>\n<rect x="34" y="758" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="782" class="cmd-alt">ansible all -m setup | grep ansible_os_family</text>\n</g>\n<g transform="translate(1140 964)">\n<rect width="970" height="778" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">4. PostgreSQL archive and SELinux fixes</text>\n<text x="34" y="86" class="panel-copy">Small but critical operational commands that appear during archive troubleshooting, config</text>\n<text x="34" y="108" class="panel-copy">reloading, and policy enforcement.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">DB AND POLICY</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">vim /data/postgres/main/pg_hba.conf</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">sudo vi /data/postgres/main/postgresql.conf</text>\n<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">sudo -u postgres psql -c &quot;SELECT pg_reload_conf();&quot;</text>\n<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="366" class="cmd-alt">tail -f /var/log/postgresql/postgresql-14-main.log</text>\n<rect x="34" y="398" width="902" height="64" rx="12" class="cmd-box" />\n<text x="50" y="422" class="cmd">archive_command = 'test -f /data/postgres/archive/%f || cp %p</text>\n<text x="50" y="442" class="cmd">/data/postgres/archive/%f'</text>\n<rect x="34" y="474" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="498" class="cmd-alt">sestatus</text>\n<rect x="34" y="530" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="554" class="cmd">audit2allow -a</text>\n<rect x="34" y="586" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="610" class="cmd-alt">semanage fcontext -a -t postgresql_db_t &quot;/data/postgres/archive(/.*)?&quot;</text>\n<rect x="34" y="642" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="666" class="cmd">restorecon -Rv /data/postgres/archive</text>\n<rect x="34" y="698" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="722" class="cmd-alt">getent passwd svc_user</text>\n</g>\n</g>\n</svg>