<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="2710" viewBox="0 0 2200 2710" role="img" aria-label="Linux Engineer Command List — Python, Ansible, DB, Patching poster">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111d" />
      <stop offset="55%" stop-color="#0c1828" />
      <stop offset="100%" stop-color="#050b14" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5b87" />
      <stop offset="50%" stop-color="#2f7f8a" />
      <stop offset="100%" stop-color="#4d8d51" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#02060d" flood-opacity="0.42" />
    </filter>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #f4f8ff; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #a4b6c8; }
      .badge { font: 700 18px "Consolas", "Courier New", monospace; fill: #8edcff; letter-spacing: 2px; }
      .panel { fill: rgba(10, 20, 33, 0.94); stroke: url(#stroke); stroke-width: 2; }
      .panel-title { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #f6fbff; }
      .panel-copy { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #99aec0; }
      .label { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #7bc7ff; letter-spacing: 1px; }
      .cmd { font: 400 15px "Consolas", "Courier New", monospace; fill: #9ef2bf; }
      .cmd-alt { font: 400 15px "Consolas", "Courier New", monospace; fill: #8dd9ff; }
      .small { font: 400 14px "Consolas", "Courier New", monospace; fill: #90a5b6; }
      .chip { fill: #0b1f31; stroke: #275676; stroke-width: 1.2; }
      .grid { stroke: rgba(120, 162, 190, 0.08); stroke-width: 1; }
      .rule { stroke: rgba(120, 170, 201, 0.18); stroke-width: 1; }
      .cmd-box { fill: #091524; stroke: rgba(85, 141, 182, 0.25); stroke-width: 1; }
    </style>
  </defs>

<rect width="2200" height="2710" fill="url(#bg)" />
<g opacity="0.22">
<path d="M0 180h2200M0 400h2200M0 620h2200M0 840h2200M0 1060h2200M0 1280h2200M0 1500h2200M0 1720h2200M0 1940h2200M0 2160h2200M0 2380h2200M0 2600h2200" class="grid" />
<path d="M150 0v2710M410 0v2710M670 0v2710M930 0v2710M1190 0v2710M1450 0v2710M1710 0v2710M1970 0v2710" class="grid" />
</g>
<circle cx="1930" cy="180" r="180" fill="#123257" opacity="0.16" />
<circle cx="260" cy="2590" r="220" fill="#193b24" opacity="0.14" />
<g transform="translate(90 84)">
<rect x="0" y="0" width="540" height="44" rx="22" class="chip" />
<text x="24" y="29" class="badge">AUTOMATION / PYTHON / DATABASE / PATCHING</text>
<text x="0" y="104" class="title">Linux Engineer Command List — Python, Ansible, DB, Patching</text>
<text x="0" y="142" class="subtitle">Python environments, playbook runs, Vault workflows, DNF advisory patching, Ansible ad-hoc, and PostgreSQL SELinux fixes.</text>
</g>
<g filter="url(#shadow)">
<g transform="translate(90 310)">
<rect width="970" height="590" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">1. Bootstrap the Python environment</text>
<text x="34" y="86" class="panel-copy">Create the virtual environment first so repository dependencies stay isolated. Manage</text>
<text x="34" y="108" class="panel-copy">requirements effectively.</text>
<line x1="34" y1="130" x2="936" y2="130" class="rule" />
<text x="34" y="160" class="label">PYTHON BOOTSTRAP</text>
<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="198" class="cmd">python3.12 -m venv .venv</text>
<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="254" class="cmd-alt">source .venv/bin/activate</text>
<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="310" class="cmd">python -m pip install --upgrade pip</text>
<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="366" class="cmd-alt">pip install -r requirements.txt</text>
<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="422" class="cmd">pip freeze &gt; requirements.txt</text>
<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="478" class="cmd-alt">pip list --outdated</text>
<rect x="34" y="510" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="534" class="cmd">python3.12 -m http.server 8080</text>
</g>
<g transform="translate(1140 310)">
<rect width="970" height="814" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">2. DNF advisory-based patching</text>
<text x="34" y="86" class="panel-copy">Inspect available errata, review severity and CVEs, then apply specific advisories without</text>
<text x="34" y="108" class="panel-copy">updating everything on the system.</text>
<line x1="34" y1="130" x2="936" y2="130" class="rule" />
<text x="34" y="160" class="label">RHEL PATCH MANAGEMENT</text>
<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="198" class="cmd">dnf check-update</text>
<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="254" class="cmd-alt">dnf updateinfo list</text>
<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="310" class="cmd">dnf updateinfo info</text>
<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="366" class="cmd-alt">dnf updateinfo list --security</text>
<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="422" class="cmd">dnf updateinfo list --sec-severity=Critical --sec-severity=Important</text>
<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="478" class="cmd-alt">dnf upgrade --advisory RHSA-2025:1234 -y</text>
<rect x="34" y="510" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="534" class="cmd">dnf upgrade --security -y</text>
<rect x="34" y="566" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="590" class="cmd-alt">dnf upgrade --security --sec-severity=Critical -y</text>
<rect x="34" y="622" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="646" class="cmd">dnf download --resolve --destdir=/tmp/patches --security</text>
<rect x="34" y="678" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="702" class="cmd-alt">rpm -qa --last | head -20</text>
<rect x="34" y="734" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="758" class="cmd">rpm -V package-name</text>
</g>
<g transform="translate(90 940)">
<rect width="970" height="982" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">3. Ansible ad-hoc execution patterns</text>
<text x="34" y="86" class="panel-copy">Run targeted commands across host groups without writing a playbook. Ideal for patching waves,</text>
<text x="34" y="108" class="panel-copy">health checks, and triage.</text>
<line x1="34" y1="130" x2="936" y2="130" class="rule" />
<text x="34" y="160" class="label">ANSIBLE AD-HOC</text>
<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="198" class="cmd">ansible all -i inventory/stage -m ping</text>
<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="254" class="cmd-alt">ansible -i inventory/stage web_servers_rhel9_* \</text>
<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="310" class="cmd">  -u svc_deploy -e &quot;ansible_password={{ lookup('env','DEPLOY_PASS') }}&quot; \</text>
<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="366" class="cmd-alt">  -e &quot;ansible_become_password={{ lookup('env','DEPLOY_PASS') }}&quot; \</text>
<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="422" class="cmd">  -b -m shell -a 'dnf updateinfo; dnf upgrade --advisory RHSA-2025:1234 -y'</text>
<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="478" class="cmd-alt">ansible -i inventory/stage app_servers_* -u svc_deploy \</text>
<rect x="34" y="510" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="534" class="cmd">  -e &quot;ansible_password={{ lookup('env','DEPLOY_PASS') }}&quot; \</text>
<rect x="34" y="566" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="590" class="cmd-alt">  -b -m shell -a 'df -h / /apps /data'</text>
<rect x="34" y="622" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="646" class="cmd">ansible -i inventory/stage db_servers_* -u svc_deploy \</text>
<rect x="34" y="678" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="702" class="cmd">  -e &quot;ansible_password={{ lookup('env','DEPLOY_PASS') }}&quot; \</text>
<rect x="34" y="734" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="758" class="cmd">  -b -m shell -a 'rpm -q postgresql-server'</text>
<rect x="34" y="790" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="814" class="cmd">ansible -i inventory/stage all -u svc_deploy \</text>
<rect x="34" y="846" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="870" class="cmd">  -e &quot;ansible_password={{ lookup('env','DEPLOY_PASS') }}&quot; \</text>
<rect x="34" y="902" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="926" class="cmd">  -b -m shell -a 'sestatus; getenforce'</text>
</g>
<g transform="translate(1140 1164)">
<rect width="970" height="740" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">4. Galaxy, Vault, and playbook runs</text>
<text x="34" y="86" class="panel-copy">Install dependencies, manage secrets, and run playbooks with safe dry-run and limit flags.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">ANSIBLE CORE</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">ansible-galaxy install -r requirements.yml</text>
<rect x="34" y="208" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="232" class="cmd-alt">ansible-playbook --check --diff playbook.yml</text>
<rect x="34" y="264" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="288" class="cmd">ansible-playbook playbook.yml --step</text>
<rect x="34" y="320" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="344" class="cmd-alt">ansible-inventory -i inventory/stage/ --graph</text>
<rect x="34" y="376" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="400" class="cmd">ansible-vault encrypt_string --stdin-name 'service_secret'</text>
<rect x="34" y="432" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="456" class="cmd-alt">ansible-vault encrypt files/target-host/tls.key --vault-password-file</text>
<text x="50" y="476" class="cmd-alt">~/.secure/vault/platform.pass</text>
<rect x="34" y="508" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="532" class="cmd">ansible-vault decrypt files/target-host/tls.crt --vault-password-file</text>
<text x="50" y="552" class="cmd">~/.secure/vault/platform.pass</text>
<rect x="34" y="584" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="608" class="cmd-alt">ansible localhost -m debug -a &quot;var=vault_secret_name&quot; -e</text>
<text x="50" y="628" class="cmd-alt">&quot;@inventory/lab/group_vars/all/secret_vars.yml&quot; --ask-vault-pass</text>
<rect x="34" y="660" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="684" class="cmd">ansible all -m setup | grep ansible_os_family</text>
</g>
<g transform="translate(1140 1944)">
<rect width="970" height="666" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">5. PostgreSQL archive and SELinux fixes</text>
<text x="34" y="86" class="panel-copy">Small but critical operational commands for archive troubleshooting, config reloading, and</text>
<text x="34" y="108" class="panel-copy">policy enforcement.</text>
<line x1="34" y1="130" x2="936" y2="130" class="rule" />
<text x="34" y="160" class="label">DB AND POLICY</text>
<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="198" class="cmd">vim /data/postgres/main/pg_hba.conf</text>
<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="254" class="cmd-alt">sudo -u postgres psql -c &quot;SELECT pg_reload_conf();&quot;</text>
<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="310" class="cmd">tail -f /var/log/postgresql/postgresql-14-main.log</text>
<rect x="34" y="342" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="366" class="cmd-alt">archive_command = 'test -f /data/postgres/archive/%f || cp %p</text>
<text x="50" y="386" class="cmd-alt">/data/postgres/archive/%f'</text>
<rect x="34" y="418" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="442" class="cmd">sestatus</text>
<rect x="34" y="474" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="498" class="cmd-alt">audit2allow -a</text>
<rect x="34" y="530" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="554" class="cmd">semanage fcontext -a -t postgresql_db_t &quot;/data/postgres/archive(/.*)?&quot;</text>
<rect x="34" y="586" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="610" class="cmd-alt">restorecon -Rv /data/postgres/archive</text>
</g>
</g>
</svg>