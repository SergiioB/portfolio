<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1920" viewBox="0 0 2200 1920" role="img" aria-label="Linux Engineer Command List — Python, Ansible, and PostgreSQL poster">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111d" />
      <stop offset="55%" stop-color="#0c1828" />
      <stop offset="100%" stop-color="#050b14" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5b87" />
      <stop offset="50%" stop-color="#2f7f8a" />
      <stop offset="100%" stop-color="#4d8d51" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#02060d" flood-opacity="0.42" />
    </filter>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #f4f8ff; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #a4b6c8; }
      .badge { font: 700 18px "Consolas", "Courier New", monospace; fill: #8edcff; letter-spacing: 2px; }
      .panel { fill: rgba(10, 20, 33, 0.94); stroke: url(#stroke); stroke-width: 2; }
      .panel-title { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #f6fbff; }
      .panel-copy { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #99aec0; }
      .label { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #7bc7ff; letter-spacing: 1px; }
      .cmd { font: 400 15px "Consolas", "Courier New", monospace; fill: #9ef2bf; }
      .cmd-alt { font: 400 15px "Consolas", "Courier New", monospace; fill: #8dd9ff; }
      .small { font: 400 14px "Consolas", "Courier New", monospace; fill: #90a5b6; }
      .chip { fill: #0b1f31; stroke: #275676; stroke-width: 1.2; }
      .grid { stroke: rgba(120, 162, 190, 0.08); stroke-width: 1; }
      .rule { stroke: rgba(120, 170, 201, 0.18); stroke-width: 1; }
      .cmd-box { fill: #091524; stroke: rgba(85, 141, 182, 0.25); stroke-width: 1; }
    </style>
  </defs>

<rect width="2200" height="1920" fill="url(#bg)" />
<g opacity="0.22">
<path d="M0 180h2200M0 400h2200M0 620h2200M0 840h2200M0 1060h2200M0 1280h2200M0 1500h2200M0 1720h2200" class="grid" />
<path d="M150 0v1920M410 0v1920M670 0v1920M930 0v1920M1190 0v1920M1450 0v1920M1710 0v1920M1970 0v1920" class="grid" />
</g>
<circle cx="1930" cy="180" r="180" fill="#123257" opacity="0.16" />
<circle cx="260" cy="1800" r="220" fill="#193b24" opacity="0.14" />
<g transform="translate(90 84)">
<rect x="0" y="0" width="470" height="44" rx="22" class="chip" />
<text x="24" y="29" class="badge">AUTOMATION / PYTHON / DATABASE</text>
<text x="0" y="104" class="title">Linux Engineer Command List — Python, Ansible, and PostgreSQL</text>
<text x="0" y="142" class="subtitle">Python environments, playbook runs, collection dependencies, Vault workflows, and PostgreSQL SELinux fixes.</text>
</g>
<g filter="url(#shadow)">
<g transform="translate(90 310)">
<rect width="970" height="600" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">1. Bootstrap the Python environment</text>
<text x="34" y="86" class="panel-copy">Create the virtual environment first so repository dependencies stay isolated.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">PYTHON BOOTSTRAP</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">python3.12 -m venv .venv</text>
<rect x="34" y="208" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="232" class="cmd-alt">source .venv/bin/activate</text>
<rect x="34" y="264" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="288" class="cmd">python -m pip install --upgrade pip</text>
<rect x="34" y="320" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="344" class="cmd-alt">pip install -r requirements.txt</text>
<rect x="34" y="376" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="400" class="cmd">python3.12 -m http.server 8080</text>
</g>
<g transform="translate(1140 310)">
<rect width="970" height="740" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">2. Common Ansible execution patterns</text>
<text x="34" y="86" class="panel-copy">These are the real playbook commands that repeatedly appear during provisioning and follow-up fixes.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">PLAYBOOK RUNS</text>
<rect x="34" y="152" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">ansible-playbook -i inventory/lab/ playbooks/platform-bootstrap.yml</text>
<text x="50" y="196" class="cmd">--limit='target-host' -t app_db_client</text>
<rect x="34" y="228" width="902" height="84" rx="12" class="cmd-box" />
<text x="50" y="252" class="cmd-alt">ansible-playbook -i inventory/stage/ playbooks/platform-bootstrap.yml</text>
<text x="50" y="272" class="cmd-alt">--limit='target-host' -t common_usersetup,common_filesystems,common_rhel,com</text>
<text x="50" y="292" class="cmd-alt">mon_security,common_customization</text>
<rect x="34" y="324" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="348" class="cmd">ansible-playbook -i inventory/stage/ playbooks/app_postgresql_prereqs.yml</text>
<text x="50" y="368" class="cmd">--limit='target-host'</text>
</g>
<g transform="translate(90 980)">
<rect width="970" height="820" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">3. Galaxy, Vault, and ad-hoc debugging</text>
<text x="34" y="86" class="panel-copy">Use these when installing dependencies, creating secrets, or validating variables without exposing data.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">ANSIBLE CORE</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">ansible-galaxy install -r requirements.yml</text>
<rect x="34" y="208" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="232" class="cmd-alt">ansible-galaxy install -r roles/platform_role/collections/requirements.yml</text>
<rect x="34" y="264" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="288" class="cmd-alt">pip install -r collections/ansible_collections/community/general/requirement</text>
<text x="50" y="308" class="cmd-alt">s.yml</text>
<rect x="34" y="340" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="364" class="cmd">ansible-vault encrypt_string --stdin-name 'service_secret'</text>
<rect x="34" y="396" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="420" class="cmd-alt">ansible-vault encrypt files/target-host/tls.key --vault-password-file</text>
<text x="50" y="440" class="cmd-alt">~/.secure/vault/platform.pass --encrypt-vault-id default</text>
<rect x="34" y="472" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="496" class="cmd">ansible-vault decrypt files/target-host/tls.crt --vault-password-file</text>
<text x="50" y="516" class="cmd">~/.secure/vault/platform.pass</text>
<rect x="34" y="548" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="572" class="cmd-alt">ansible localhost -m debug -a &quot;var=vault_secret_name&quot; -e</text>
<text x="50" y="592" class="cmd-alt">&quot;@inventory/lab/group_vars/all/secret_vars.yml&quot; --ask-vault-pass</text>
</g>
<g transform="translate(1140 1100)">
<rect width="970" height="700" rx="28" class="panel" />
<text x="34" y="54" class="panel-title">4. PostgreSQL archive and SELinux fixes</text>
<text x="34" y="86" class="panel-copy">Small but critical operational commands that appear during archive, policy, and ownership troubleshooting.</text>
<line x1="34" y1="108" x2="936" y2="108" class="rule" />
<text x="34" y="138" class="label">DB AND POLICY</text>
<rect x="34" y="152" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="176" class="cmd">vim /data/postgres/main/pg_hba.conf</text>
<rect x="34" y="208" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="232" class="cmd-alt">sudo vi /data/postgres/main/postgresql.conf</text>
<rect x="34" y="264" width="902" height="64" rx="12" class="cmd-box" />
<text x="50" y="288" class="cmd">archive_command = 'test -f /data/postgres/archive/%f || cp %p</text>
<text x="50" y="308" class="cmd">/data/postgres/archive/%f'</text>
<rect x="34" y="340" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="364" class="cmd-alt">semanage fcontext -a -t postgresql_db_t &quot;/data/postgres/archive(/.*)?&quot;</text>
<rect x="34" y="396" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="420" class="cmd">restorecon -Rv /data/postgres/archive</text>
<rect x="34" y="452" width="902" height="44" rx="12" class="cmd-box" />
<text x="50" y="476" class="cmd-alt">getent passwd svc_user</text>
</g>
</g>
</svg>