<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1742" viewBox="0 0 2200 1742" role="img" aria-label="Linux Engineer Command List — Networking and Perf poster">\n
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111d" />
      <stop offset="55%" stop-color="#0c1828" />
      <stop offset="100%" stop-color="#050b14" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5b87" />
      <stop offset="50%" stop-color="#2f7f8a" />
      <stop offset="100%" stop-color="#4d8d51" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#02060d" flood-opacity="0.42" />
    </filter>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #f4f8ff; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #e2e8f0; }
      .badge { font: 700 18px "Consolas", "Courier New", monospace; fill: #bae6fd; letter-spacing: 2px; }
      .panel { fill: rgba(10, 20, 33, 0.94); stroke: url(#stroke); stroke-width: 2; }
      .panel-title { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #f6fbff; }
      .panel-copy { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #f1f5f9; }
      .label { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #38bdf8; letter-spacing: 1px; }
      .cmd { font: 400 15px "Consolas", "Courier New", monospace; fill: #4ade80; font-weight: bold; }
      .cmd-alt { font: 400 15px "Consolas", "Courier New", monospace; fill: #7dd3fc; font-weight: bold; }
      .small { font: 400 14px "Consolas", "Courier New", monospace; fill: #cbd5e1; }
      .chip { fill: #0b1f31; stroke: #275676; stroke-width: 1.2; }
      .grid { stroke: rgba(255, 255, 255, 0.15); stroke-width: 1; }
      .rule { stroke: rgba(255, 255, 255, 0.25); stroke-width: 1; }
      .cmd-box { fill: #091524; stroke: rgba(255, 255, 255, 0.3); stroke-width: 1; }
    </style>
  </defs>
\n<rect width="2200" height="1742" fill="url(#bg)" />\n<g opacity="0.22">\n<path d="M0 180h2200M0 400h2200M0 620h2200M0 840h2200M0 1060h2200M0 1280h2200M0 1500h2200M0 1720h2200" class="grid" />\n<path d="M150 0v1742M410 0v1742M670 0v1742M930 0v1742M1190 0v1742M1450 0v1742M1710 0v1742M1970 0v1742" class="grid" />\n</g>\n<circle cx="1930" cy="180" r="180" fill="#123257" opacity="0.16" />\n<circle cx="260" cy="1622" r="220" fill="#193b24" opacity="0.14" />\n<g transform="translate(90 84)">\n<rect x="0" y="0" width="540" height="44" rx="22" class="chip" />\n<text x="24" y="29" class="badge">LINUX / NETWORKING / PERF</text>\n<text x="0" y="104" class="title">Linux Engineer Command List — Networking and Perf</text>\n<text x="0" y="142" class="subtitle">Traffic analysis, port diagnostics, load metrics, memory usage, and firewalls.</text>\n</g>\n<g filter="url(#shadow)">\n<g transform="translate(90 310)">\n<rect width="970" height="534" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">1. Port Bindings and Connections</text>\n<text x="34" y="86" class="panel-copy">Identify what is listening, who is connected, and test remote connectivity without external</text>\n<text x="34" y="108" class="panel-copy">tools.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">PORTS AND SOCKETS</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">ss -tulnp | grep LISTEN</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">netstat -anp | grep :80</text>\n<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">lsof -i :443</text>\n<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="366" class="cmd-alt">nc -zv target-host 22</text>\n<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="422" class="cmd">telnet target-host 443</text>\n<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="478" class="cmd-alt">curl -vI https://target-host</text>\n</g>\n<g transform="translate(1140 310)">\n<rect width="970" height="646" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">2. Traffic and Routing</text>\n<text x="34" y="86" class="panel-copy">Check routing tables, trace network paths, and capture live packets to debug network drops and</text>\n<text x="34" y="108" class="panel-copy">DNS issues.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">ROUTES AND PACKETS</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">ip addr show</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">ip route show</text>\n<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">ping -c 4 8.8.8.8</text>\n<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="366" class="cmd-alt">traceroute target-host</text>\n<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="422" class="cmd">mtr target-host</text>\n<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="478" class="cmd-alt">tcpdump -i eth0 port 53</text>\n<rect x="34" y="510" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="534" class="cmd">tcpdump -i any -nn -s0 -v port 80</text>\n<rect x="34" y="566" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="590" class="cmd-alt">dig +short target-host A</text>\n</g>\n<g transform="translate(90 884)">\n<rect width="970" height="646" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">3. Load and System Diagnostics</text>\n<text x="34" y="86" class="panel-copy">Monitor active processes, CPU load, memory limits, and I/O wait times to identify system</text>\n<text x="34" y="108" class="panel-copy">bottlenecks.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">METRICS AND LOAD</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">uptime</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">top -b -n 1 | head -n 20</text>\n<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">htop</text>\n<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="366" class="cmd-alt">free -m</text>\n<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="422" class="cmd">vmstat 1 5</text>\n<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="478" class="cmd-alt">iostat -x 1 5</text>\n<rect x="34" y="510" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="534" class="cmd">sar -u 1 3</text>\n<rect x="34" y="566" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="590" class="cmd-alt">dmesg -T | tail -n 50</text>\n</g>\n<g transform="translate(1140 996)">\n<rect width="970" height="646" rx="28" class="panel" />\n<text x="34" y="54" class="panel-title">4. Firewalld and Iptables</text>\n<text x="34" y="86" class="panel-copy">List active firewall rules, open ports permanently, and reload configurations safely without</text>\n<text x="34" y="108" class="panel-copy">dropping connections.</text>\n<line x1="34" y1="130" x2="936" y2="130" class="rule" />\n<text x="34" y="160" class="label">FIREWALL RULES</text>\n<rect x="34" y="174" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="198" class="cmd">firewall-cmd --state</text>\n<rect x="34" y="230" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="254" class="cmd-alt">firewall-cmd --list-all</text>\n<rect x="34" y="286" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="310" class="cmd">firewall-cmd --add-port=8080/tcp --permanent</text>\n<rect x="34" y="342" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="366" class="cmd-alt">firewall-cmd --reload</text>\n<rect x="34" y="398" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="422" class="cmd">iptables -L -n -v</text>\n<rect x="34" y="454" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="478" class="cmd-alt">iptables -t nat -L -n -v</text>\n<rect x="34" y="510" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="534" class="cmd">iptables-save &gt; /etc/iptables/rules.v4</text>\n<rect x="34" y="566" width="902" height="44" rx="12" class="cmd-box" />\n<text x="50" y="590" class="cmd-alt">ufw status verbose</text>\n</g>\n</g>\n</svg>