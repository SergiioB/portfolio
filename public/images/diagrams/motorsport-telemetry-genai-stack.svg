  <path d="M 272 246 L 314 246" stroke="#bca8ff" stroke-width="4" marker-end="url(#arrow3)" fill="none"/>
  <path d="M 574 246 L 622 246" stroke="#bca8ff" stroke-width="4" marker-end="url(#arrow3)" fill="none"/>
  <path d="M 1088 246 C 1128 246 1128 246 1128 418" stroke="#ff4fd8" stroke-width="4" marker-end="url(#arrow3)" fill="none"/>

  <g transform="translate(786,418)">
