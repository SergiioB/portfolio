    <text x="130" y="58" fill="#d2c8ee" font-family="Arial" font-size="12" text-anchor="middle">Normalize, extract, join, and structure</text>
    <rect x="28" y="84" width="204" height="28" rx="10" fill="#130f1f" stroke="#b188ff"/>
    <text x="130" y="102" fill="#eadfff" font-family="Courier New" font-size="10" text-anchor="middle">normalize telemetry schema</text>
    <rect x="28" y="124" width="204" height="28" rx="10" fill="#130f1f" stroke="#b188ff"/>
    <text x="130" y="142" fill="#eadfff" font-family="Courier New" font-size="10" text-anchor="middle">speech-to-text and entity extraction</text>
