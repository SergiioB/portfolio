      </rect>
      <text x="73" y="30" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">LLM Core</text>
      <text x="73" y="54" fill="#ffcaef" font-family="Arial" font-size="11" text-anchor="middle">Reasoning and synthesis</text>
      <text x="73" y="76" fill="#d2c8ee" font-family="Courier New" font-size="10" text-anchor="middle">reason() -> explain()</text>
    </g>

    <g transform="translate(106,192)">
      <rect width="328" height="70" rx="16" fill="#1f1830" stroke="#7c4dff" stroke-width="2"/>
      <text x="164" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Guardrails and Output Shaping</text>
