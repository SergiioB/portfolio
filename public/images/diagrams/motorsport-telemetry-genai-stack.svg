      <text x="78" y="54" fill="#ffcaef" font-family="Arial" font-size="11" text-anchor="middle">Historical laps and incidents</text>
      <text x="78" y="76" fill="#d2c8ee" font-family="Courier New" font-size="10" text-anchor="middle">retrieve(top_k)</text>
    </g>

    <g transform="translate(198,68)">
      <rect width="156" height="100" rx="16" fill="#1f1830" stroke="#ff4fd8" stroke-width="2"/>
      <text x="78" y="30" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Orchestrator</text>
      <text x="78" y="54" fill="#ffcaef" font-family="Arial" font-size="11" text-anchor="middle">Prompt policy and tool routing</text>
      <text x="78" y="76" fill="#d2c8ee" font-family="Courier New" font-size="10" text-anchor="middle">Bedrock / Vertex AI</text>
    </g>

    <g transform="translate(372,68)">
      <rect width="146" height="100" rx="16" fill="#1f1830" stroke="#ff4fd8" stroke-width="2" filter="url(#glow3)">
