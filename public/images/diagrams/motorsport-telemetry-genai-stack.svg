  <rect width="1200" height="620" rx="24" fill="url(#bg3)"/>
  <text x="600" y="44" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Motorsport GenAI Reasoning Stack</text>
  <text x="600" y="72" fill="#d2c8ee" font-family="Arial" font-size="14" text-anchor="middle">Clean view of multimodal inputs, context preparation, retrieval, orchestration, inference, and operator-ready outputs.</text>

  <g transform="translate(36,126)">
    <rect width="236" height="240" rx="18" fill="#1f1830" stroke="#7c4dff" stroke-width="2"/>
