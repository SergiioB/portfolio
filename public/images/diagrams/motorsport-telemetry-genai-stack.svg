    <rect x="24" y="72" width="188" height="34" rx="10" fill="#130f1f" stroke="#9f7cff"/>
    <text x="118" y="94" fill="#d8cbff" font-family="Courier New" font-size="11" text-anchor="middle">Live telemetry vectors</text>
    <rect x="24" y="120" width="188" height="34" rx="10" fill="#130f1f" stroke="#9f7cff"/>
    <text x="118" y="142" fill="#d8cbff" font-family="Courier New" font-size="11" text-anchor="middle">Driver radio transcripts</text>
    <rect x="24" y="168" width="188" height="34" rx="10" fill="#130f1f" stroke="#9f7cff"/>
    <text x="118" y="190" fill="#d8cbff" font-family="Courier New" font-size="11" text-anchor="middle">Track map and corner metadata</text>
    <rect x="24" y="220" width="188" height="14" rx="7" fill="#130f1f"/>
    <rect x="24" y="220" width="76" height="14" rx="7" fill="#ff4fd8">
