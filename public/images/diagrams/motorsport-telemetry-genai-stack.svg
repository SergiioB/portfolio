    <text x="130" y="182" fill="#eadfff" font-family="Courier New" font-size="10" text-anchor="middle">lap, delta, weather, corner joins</text>
    <rect x="28" y="212" width="204" height="8" rx="4" fill="#b188ff" opacity="0.25"/>
    <rect x="52" y="212" width="72" height="8" rx="4" fill="#b188ff">
