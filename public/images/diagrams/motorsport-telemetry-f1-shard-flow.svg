<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#161b2f" />
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb347" />
      <stop offset="100%" stop-color="#ff6b00" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8ec5ff" />
    </marker>
  </defs>
  <rect width="1200" height="720" rx="24" fill="url(#bg)"/>
  <text x="600" y="46" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Formula 1 AWS Telemetry: Shards, Buffers, and Race-State Fan-Out</text>
  <text x="600" y="74" fill="#9fb7d9" font-family="Arial" font-size="14" text-anchor="middle">Animated view of how raw RF telemetry becomes cached race intelligence, ML simulation input, and GenAI narrative output.</text>

  <g transform="translate(40,110)">
    <rect width="220" height="190" rx="18" fill="#1d2438" stroke="#4fd1ff" stroke-width="2"/>
    <text x="110" y="34" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Car Sensor Bus</text>
    <text x="110" y="62" fill="#c5d8f7" font-family="Arial" font-size="13" text-anchor="middle">CAN, ECU, battery, aero, GPS, tire IR</text>
    <rect x="22" y="88" width="176" height="28" rx="8" fill="#0f1728" stroke="#4fd1ff"/>
    <text x="110" y="107" fill="#92f0ff" font-family="Courier New" font-size="12" text-anchor="middle">300+ channels / 1.1M points/sec</text>
    <rect x="22" y="128" width="176" height="24" rx="8" fill="#0f1728" stroke="#ff7f7f"/>
    <text x="110" y="145" fill="#ffd1d1" font-family="Courier New" font-size="11" text-anchor="middle">ERS, MGU-K, X/Z mode, brake-by-wire</text>
    <rect x="22" y="162" width="176" height="16" rx="8" fill="#0f1728"/>
    <rect x="22" y="162" width="132" height="16" rx="8" fill="#00e0ff">
      <animate attributeName="width" values="60;150;110;165;132" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <text x="110" y="215" fill="#86a7d0" font-family="Arial" font-size="12" text-anchor="middle">On-car acquisition + packet framing</text>
  </g>

  <g transform="translate(320,110)">
    <rect width="220" height="190" rx="18" fill="#1d2438" stroke="#4fd1ff" stroke-width="2"/>
    <text x="110" y="34" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Trackside ETC</text>
    <text x="110" y="62" fill="#c5d8f7" font-family="Arial" font-size="13" text-anchor="middle">Event Technical Center aggregation</text>
    <rect x="22" y="88" width="176" height="26" rx="8" fill="#0f1728" stroke="#72ffd8"/>
    <text x="110" y="106" fill="#72ffd8" font-family="Courier New" font-size="11" text-anchor="middle">RF decode + CRC validation + replay</text>
    <rect x="22" y="124" width="176" height="26" rx="8" fill="#0f1728" stroke="#72ffd8"/>
    <text x="110" y="142" fill="#72ffd8" font-family="Courier New" font-size="11" text-anchor="middle">Timestamp alignment + packet ordering</text>
    <rect x="22" y="160" width="176" height="18" rx="8" fill="#11233d"/>
    <circle cx="42" cy="169" r="5" fill="#00f5a0">
      <animate attributeName="cx" values="42;178;42" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="110" y="214" fill="#86a7d0" font-family="Arial" font-size="12" text-anchor="middle">Dual fiber handoff to Biggin Hill</text>
  </g>

  <path d="M 260 205 L 320 205" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <text x="290" y="190" fill="#8ec5ff" font-family="Arial" font-size="12" text-anchor="middle">RF packets</text>

  <g transform="translate(600,80)">
    <rect width="560" height="270" rx="20" fill="none" stroke="url(#amber)" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="280" y="30" fill="#ffbe73" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">AWS Streaming and Serving Plane</text>

    <g transform="translate(24,58)">
      <rect width="170" height="164" rx="14" fill="#1b2235" stroke="#ffb347" stroke-width="2"/>
      <text x="85" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Kinesis Data Streams</text>
      <text x="85" y="50" fill="#c3d2ef" font-family="Arial" font-size="12" text-anchor="middle">Hot ingest bus with shard scaling</text>
      <g transform="translate(20,70)">
        <rect width="130" height="14" rx="7" fill="#0f1728"/>
        <rect width="95" height="14" rx="7" fill="#ff8b1f">
          <animate attributeName="width" values="35;125;65;110;95" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="65" y="12" fill="#101826" font-family="Courier New" font-size="9" text-anchor="middle">Shard 01</text>
      </g>
      <g transform="translate(20,96)">
        <rect width="130" height="14" rx="7" fill="#0f1728"/>
        <rect width="118" height="14" rx="7" fill="#ff8b1f">
          <animate attributeName="width" values="62;128;90;122;118" dur="2.1s" repeatCount="indefinite"/>
        </rect>
        <text x="65" y="12" fill="#101826" font-family="Courier New" font-size="9" text-anchor="middle">Shard 02</text>
      </g>
      <g transform="translate(20,122)">
        <rect width="130" height="14" rx="7" fill="#0f1728"/>
        <rect width="74" height="14" rx="7" fill="#ff8b1f">
          <animate attributeName="width" values="20;116;44;100;74" dur="2.8s" repeatCount="indefinite"/>
        </rect>
        <text x="65" y="12" fill="#101826" font-family="Courier New" font-size="9" text-anchor="middle">Shard N</text>
      </g>
      <text x="85" y="154" fill="#86a7d0" font-family="Arial" font-size="11" text-anchor="middle">1 MB/s or 1000 rec/s per shard baseline</text>
    </g>

    <g transform="translate(212,58)">
      <rect width="150" height="164" rx="14" fill="#1b2235" stroke="#ffb347" stroke-width="2"/>
      <text x="75" y="30" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Amazon SQS</text>
      <text x="75" y="52" fill="#c3d2ef" font-family="Arial" font-size="12" text-anchor="middle">Shock absorber queue</text>
      <g transform="translate(30,72)">
        <rect width="90" height="18" rx="9" fill="#0f1728" stroke="#65d6ff"/>
        <rect y="28" width="90" height="18" rx="9" fill="#0f1728" stroke="#65d6ff"/>
        <rect y="56" width="90" height="18" rx="9" fill="#0f1728" stroke="#65d6ff"/>
        <circle cx="10" cy="9" r="4" fill="#65d6ff">
          <animate attributeName="cx" values="10;80;10" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="80" cy="37" r="4" fill="#65d6ff">
          <animate attributeName="cx" values="80;10;80" dur="1.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="25" cy="65" r="4" fill="#65d6ff">
          <animate attributeName="cx" values="25;80;25" dur="1.6s" repeatCount="indefinite"/>
        </circle>
      </g>
      <text x="75" y="154" fill="#86a7d0" font-family="Arial" font-size="11" text-anchor="middle">Guards consumers from surge backpressure</text>
    </g>

    <g transform="translate(382,58)">
      <rect width="154" height="72" rx="14" fill="#1b2235" stroke="#ffb347" stroke-width="2"/>
      <text x="77" y="28" fill="#ffffff" font-family="Arial" font-size="17" font-weight="bold" text-anchor="middle">Lambda Metrics</text>
      <text x="77" y="50" fill="#72ffd8" font-family="Arial" font-size="11" text-anchor="middle">Split calculators / anomaly rules</text>
      <rect x="16" y="56" width="120" height="6" rx="3" fill="#72ffd8" opacity="0.35"/>
      <rect x="16" y="56" width="46" height="6" rx="3" fill="#72ffd8">
        <animate attributeName="x" values="16;92;16" dur="1.4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(382,150)">
      <rect width="154" height="72" rx="14" fill="#1b2235" stroke="#ffb347" stroke-width="2"/>
      <text x="77" y="28" fill="#ffffff" font-family="Arial" font-size="17" font-weight="bold" text-anchor="middle">ECS Fargate</text>
      <text x="77" y="50" fill="#72ffd8" font-family="Arial" font-size="11" text-anchor="middle">Strategy, joins, broadcast services</text>
      <rect x="18" y="56" width="118" height="6" rx="3" fill="#72ffd8" opacity="0.35"/>
      <rect x="44" y="56" width="55" height="6" rx="3" fill="#72ffd8">
        <animate attributeName="x" values="18;80;18" dur="1.9s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(554,58)">
      <rect width="160" height="78" rx="14" fill="#1b2235" stroke="#4fd1ff" stroke-width="2"/>
      <text x="80" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">DynamoDB</text>
      <text x="80" y="49" fill="#4fd1ff" font-family="Arial" font-size="11" text-anchor="middle">Race-state cache / key-value lookups</text>
      <text x="80" y="66" fill="#c3d2ef" font-family="Courier New" font-size="10" text-anchor="middle">car_id + lap + sector -> current state</text>
    </g>

    <g transform="translate(554,156)">
      <rect width="160" height="66" rx="14" fill="#1b2235" stroke="#4fd1ff" stroke-width="2"/>
      <text x="80" y="28" fill="#ffffff" font-family="Arial" font-size="17" font-weight="bold" text-anchor="middle">SageMaker</text>
      <text x="80" y="49" fill="#4fd1ff" font-family="Arial" font-size="11" text-anchor="middle">Tire wear / stint / energy simulation</text>
    </g>

    <g transform="translate(732,58)">
      <rect width="156" height="164" rx="14" fill="#1b2235" stroke="#ff4fd8" stroke-width="2" filter="url(#softGlow)">
        <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <text x="78" y="28" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Amazon Bedrock</text>
      <text x="78" y="52" fill="#ff9df1" font-family="Arial" font-size="11" text-anchor="middle">RAG + multimodal race narrative</text>
      <rect x="18" y="74" width="120" height="22" rx="11" fill="#2c1433" stroke="#ff4fd8"/>
      <text x="78" y="89" fill="#ffd4fa" font-family="Courier New" font-size="10" text-anchor="middle">Telemetry embeddings</text>
      <rect x="18" y="106" width="120" height="22" rx="11" fill="#2c1433" stroke="#ff4fd8"/>
      <text x="78" y="121" fill="#ffd4fa" font-family="Courier New" font-size="10" text-anchor="middle">Radio transcript context</text>
      <rect x="18" y="138" width="120" height="22" rx="11" fill="#2c1433" stroke="#ff4fd8"/>
      <text x="78" y="153" fill="#ffd4fa" font-family="Courier New" font-size="10" text-anchor="middle">Historical race retrieval</text>
    </g>
  </g>

  <path d="M 540 205 L 624 205" stroke="#8ec5ff" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <text x="582" y="189" fill="#8ec5ff" font-family="Arial" font-size="12" text-anchor="middle">fiber backhaul</text>
  <path d="M 794 256 C 794 330 794 330 794 388" stroke="#ff4fd8" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

  <path d="M 794 388 L 1054 388" stroke="#ff4fd8" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <g transform="translate(888,344)">
    <rect width="248" height="126" rx="18" fill="#1d2438" stroke="#ff4fd8" stroke-width="2"/>
    <text x="124" y="30" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Human Consumption Layer</text>
    <text x="124" y="58" fill="#ffd4fa" font-family="Arial" font-size="12" text-anchor="middle">TV graphics, race engineer prompts, strategy calls</text>
    <rect x="22" y="74" width="204" height="28" rx="10" fill="#2c1433" stroke="#ff4fd8"/>
    <text x="124" y="92" fill="#ffd4fa" font-family="Courier New" font-size="10" text-anchor="middle">"Car 16 losing ERS deployment, expect pace delta +0.5s"</text>
  </g>

  <g transform="translate(38,352)">
    <rect width="1104" height="320" rx="20" fill="#0f1728" stroke="#2f4a75" stroke-width="2"/>
    <text x="552" y="34" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">What each block means technically</text>
    <g fill="#c9daf6" font-family="Arial" font-size="14">
      <text x="26" y="74">• Car Sensor Bus: the on-board data acquisition layer combining ECU telemetry, battery current/voltage, IMU, aero mode, brake-by-wire, and GPS timing signals.</text>
      <text x="26" y="108">• Trackside ETC: validates packets, repairs order, applies a common event clock, and forwards the race stream over redundant high-capacity links.</text>
      <text x="26" y="142">• Kinesis Data Streams: append-only shard-based ingress. More shards means more parallel throughput and more consumer concurrency.</text>
      <text x="26" y="176">• Amazon SQS: asynchronous buffering so that downstream analytics cannot stall the ingest path during crashes, yellow flags, or noisy sensor storms.</text>
      <text x="26" y="210">• Lambda + ECS Fargate: split microservices; Lambda handles short-lived transforms and rule checks, Fargate handles longer-lived strategy services.</text>
      <text x="26" y="244">• DynamoDB: low-latency key-value state cache for "what is true right now" queries such as gaps, lap deltas, sector state, and overtake windows.</text>
      <text x="26" y="278">• SageMaker: heavier predictive services such as degradation, tire life, and race-scenario simulation that should not sit on the critical ingest thread.</text>
      <text x="26" y="312">• Bedrock: LLM orchestration layer joining telemetry, radio transcripts, and historical retrieval to explain events in language humans can act on.</text>
    </g>
  </g>
</svg>