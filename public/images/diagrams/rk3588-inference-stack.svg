<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="npuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3" flood-color="#000000" />
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowRouter" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg)" stroke="#334155" stroke-width="2" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="1">RK3588 INFERENCE STACK</text>
  <line x1="300" y1="55" x2="500" y2="55" stroke="#334155" stroke-width="2" />
  
  <!-- NPU Models Container -->
  <rect x="50" y="80" width="700" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="70" y="105" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" letter-spacing="0.5">AVAILABLE MODELS</text>

  <!-- Model 1: TinyLlama (NPU) -->
  <g transform="translate(80, 120)" filter="url(#shadow)">
    <rect width="200" height="100" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2" />
    <path d="M 0 8 h 200 v 24 h -200 z" fill="url(#npuGrad)" />
    <text x="100" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">TinyLlama 1.1B (NPU)</text>
    <text x="100" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Format: W8A8</text>
    <text x="100" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#10b981" text-anchor="middle">Speed: 15 tok/s</text>
    <text x="100" y="90" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Priority: 110</text>
  </g>

  <!-- Model 2: Qwen3-1.7B (NPU) -->
  <g transform="translate(300, 120)" filter="url(#shadow)">
    <rect width="200" height="100" rx="8" fill="#0f172a" stroke="#059669" stroke-width="1.5" />
    <path d="M 0 8 h 200 v 24 h -200 z" fill="#059669" opacity="0.8" />
    <text x="100" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Qwen3-1.7B (NPU)</text>
    <text x="100" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Format: W8A8</text>
    <text x="100" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#34d399" text-anchor="middle">Speed: 6.7 tok/s</text>
    <text x="100" y="90" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Priority: 100</text>
  </g>

  <!-- Model 3: Qwen3.5-4B (CPU) -->
  <g transform="translate(520, 120)" filter="url(#shadow)">
    <rect width="200" height="100" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" />
    <path d="M 0 8 h 200 v 24 h -200 z" fill="url(#cpuGrad)" />
    <text x="100" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Qwen3.5-4B (CPU)</text>
    <text x="100" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Format: Q4_K_M</text>
    <text x="100" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle">Speed: 2.4 tok/s</text>
    <text x="100" y="90" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Priority: 104</text>
  </g>

  <!-- Routing Lines -->
  <path d="M 180 220 L 180 250 L 400 250 L 400 280" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 400 220 L 400 280" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 620 220 L 620 250 L 400 250" fill="none" stroke="#94a3b8" stroke-width="2" />

  <!-- Intent Router -->
  <g transform="translate(250, 290)" filter="url(#shadow)">
    <rect width="300" height="60" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" />
    <path d="M 0 8 h 300 v 16 h -300 z" fill="url(#routerGrad)" />
    <text x="150" y="19" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">INTENT ROUTER</text>
    <text x="150" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">Classifies query type dynamically</text>
  </g>

  <!-- Output Lines -->
  <path d="M 400 350 L 400 370 L 160 370 L 160 400" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowRouter)" />
  <path d="M 400 350 L 400 400" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowRouter)" />
  <path d="M 400 350 L 400 370 L 640 370 L 640 400" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowRouter)" />

  <!-- Outcomes -->
  <g transform="translate(80, 410)" filter="url(#shadow)">
    <rect width="160" height="50" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5" />
    <text x="80" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">ROUTING</text>
    <text x="80" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">(~50ms)</text>
  </g>

  <g transform="translate(320, 410)" filter="url(#shadow)">
    <rect width="160" height="50" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" />
    <text x="80" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">CHAT</text>
    <text x="80" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">(~270ms)</text>
  </g>

  <g transform="translate(560, 410)" filter="url(#shadow)">
    <rect width="160" height="50" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" />
    <text x="80" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">TOOL_HEAVY</text>
    <text x="80" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">(cold CPU)</text>
  </g>
</svg>